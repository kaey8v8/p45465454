<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <section class="w-full max-w-sm p-6 bg-white rounded-2xl border border-gray-200 shadow-xl">
        <h3 class="text-lg font-bold text-gray-800 mb-6 text-center">設定新密碼</h3>
        <div class="space-y-4">
            <input type="password" id="newPassword" placeholder="請輸入新密碼" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-hidden focus:border-blue-500">
            <button onclick="updatePassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition">更新密碼</button>
        </div>
    </section>

    <script>
        // 初始化 Supabase
        const supabaseClient = supabase.createClient("https://ojwryrmifoimjkkumdst.supabase.co/", "sb_publishable_aBjX88rDqNLETYznUHmFmw_3FcO0xbl");

        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            if (newPassword.length < 6) {
                alert("密碼至少需 6 個字元");
                return;
            }

            const { data, error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                alert("更新失敗：" + error.message);
            } else {
                alert("密碼更新成功，請重新登入。");
                window.location.href = "admin.html";
            }
        }
    </script>
</body>
</html>
