<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員審核後台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>


<!-- 註冊表單結構 -->
<input type="email" id="signupEmail" placeholder="Email" class="...">
<input type="password" id="signupPassword" placeholder="密碼" class="...">
<button onclick="handleSignUp()" class="...">註冊</button>

<script>
    // Supabase 設定
    const YOUR_SUPABASE_URL = "https://ojwryrmifoimjkkumdst.supabase.co/"; 
    const YOUR_SUPABASE_ANON_KEY = "sb_publishable_aBjX88rDqNLETYznUHmFmw_3FcO0xbl";
    const supabaseClient = supabase.createClient(YOUR_SUPABASE_URL, YOUR_SUPABASE_ANON_KEY);

    async function handleSignUp() {
        console.log(window.supabase);
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;

        // 使用 Supabase 進行註冊
        const { data, error } = await window.supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            alert("註冊失敗：" + error.message);
        } else {
            alert("註冊成功！請檢查您的 Email 以驗證帳號。");
        }
    }
</script>
