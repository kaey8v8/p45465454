<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-11 飲料抽抽樂適用商品查詢</title>
    <!-- 使用 Tailwind CSS 快速美化手機排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase 官方 CDN 腳本 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-12">

    <!-- 導覽列與後台入口 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold text-green-600">7-11 飲料抽抽樂情報站</h1>
            <a href="admin.html" class="text-xs text-gray-400 border border-gray-200 px-2 py-1 rounded hover:bg-gray-50">管理登入</a>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <!-- 區塊一：快速搜尋列與分開顯示區 -->
        <section class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <h2 class="font-semibold text-gray-700">🔍 適用商品與活動查詢</h2>
            <input type="text" id="searchInput" placeholder="輸入名稱、價格或品牌搜尋..." 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
            
            <!-- 搜尋結果展示區：拆分為飲料與活動 -->
            <div class="space-y-4 max-h-[500px] overflow-y-auto pt-2">
                
                <!-- 1. 飲料顯示區 -->
                <div>
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="w-2 h-4 bg-green-500 rounded-full"></span>
                        <h3 class="text-xs font-bold text-gray-500 tracking-wider uppercase">適用飲料品項</h3>
                    </div>
                    <div id="drinkResultsList" class="space-y-2">
                        <p class="text-xs text-gray-400 text-center py-2">資料同步中...</p>
                    </div>
                </div>

                <hr class="border-gray-100 my-2">

                <!-- 2. 活動顯示區 -->
                <div>
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="w-2 h-4 bg-blue-500 rounded-full"></span>
                        <h3 class="text-xs font-bold text-gray-500 tracking-wider uppercase">進行中品牌抽獎活動</h3>
                    </div>
                    <div id="eventResultsList" class="space-y-2">
                        <p class="text-xs text-gray-400 text-center py-2">資料同步中...</p>
                    </div>
                </div>

            </div>
        </section>

        <!-- 區塊二：熱心回報表單 -->
        <section class="bg-white p-4 rounded-xl shadow-sm space-y-4">
            <h2 class="font-semibold text-gray-700">✍️ 發現漏網之魚？歡迎回報！</h2>
            
            <div class="flex space-x-2 border-b border-gray-200 pb-2">
                <button id="tabDrink" onclick="switchForm('drink')" class="flex-1 text-center pb-2 text-sm font-medium border-b-2 border-green-500 text-green-600">回報飲料</button>
                <button id="tabEvent" onclick="switchForm('event')" class="flex-1 text-center pb-2 text-sm font-medium border-b-2 border-transparent text-gray-400">回報抽獎活動</button>
            </div>

            <!-- 飲料表單 -->
            <form id="drinkForm" class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">飲料品項名稱 *</label>
                    <input type="text" name="name" required placeholder="例如：純在芒果甘露" class="w-full p-2 border border-gray-200 rounded text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">單瓶價格 *</label>
                        <input type="number" name="price" required placeholder="65" class="w-full p-2 border border-gray-200 rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">備註 (選填)</label>
                        <input type="text" name="remark" placeholder="例如：現正買一送一" class="w-full p-2 border border-gray-200 rounded text-sm">
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-2 rounded-lg transition">提交審核</button>
            </form>

            <!-- 活動表單 (預設隱藏) -->
            <form id="eventForm" class="space-y-3 hidden">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">品牌/活動名稱 *</label>
                    <input type="text" name="brand" required placeholder="例如：可口可樂-無糖" class="w-full p-2 border border-gray-200 rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">活動登錄網址 *</label>
                    <input type="url" name="url" required placeholder="https://..." class="w-full p-2 border border-gray-200 rounded text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">截止日期</label>
                        <input type="text" name="end_date" placeholder="2026/09/02" class="w-full p-2 border border-gray-200 rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">活動細節備註</label>
                        <input type="text" name="detail" placeholder="例如：任兩瓶登發票" class="w-full p-2 border border-gray-200 rounded text-sm">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition">提交審核</button>
            </form>
        </section>
    </main>

    <!-- 幕後 JavaScript 核心邏輯 -->
    <script>
        // 🛠️ Supabase 設定
        const SUPABASE_URL = "https://akxaulhkzlckkaxdthxo.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_LP-Jf6ygyLe4rKNVeqS83A_E5jmMzw0";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 分開儲存原始資料集
        let allDrinks = [];
        let allEvents = [];

        // 頁面初始化：併行讀取已核准的飲料與活動資料
        async function initData() {
            try {
                // 使用 Promise.all 同時發出兩個請求，效能最佳
                const [drinkRes, eventRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'approved').order('created_at', { ascending: false }),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'approved').order('created_at', { ascending: false })
                ]);

                if (drinkRes.error) throw drinkRes.error;
                if (eventRes.error) throw eventRes.error;

                allDrinks = drinkRes.data || [];
                allEvents = eventRes.data || [];

                // 首次渲染全部資料
                renderDrinks(allDrinks);
                renderEvents(allEvents);

            } catch (e) {
                console.error("資料載入失敗：", e);
                const errHtml = `<p class="text-xs text-red-500 text-center py-2">資料載入失敗，請重新整理</p>`;
                document.getElementById('drinkResultsList').innerHTML = errHtml;
                document.getElementById('eventResultsList').innerHTML = errHtml;
            }
        }

        // 渲染飲料清單 (綠色風格)
        function renderDrinks(data) {
            const list = document.getElementById('drinkResultsList');
            if (data.length === 0) {
                list.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">暫無相關飲料商品</p>`;
                return;
            }
            list.innerHTML = data.map(item => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100 hover:border-green-200 transition">
                    <div>
                        <div class="font-medium text-sm text-gray-800">${item.name}</div>
                        ${item.remark ? `<div class="text-xs text-gray-400">${item.remark}</div>` : ''}
                    </div>
                    <div class="text-green-600 font-bold text-sm flex-shrink-0 ml-2">${item.price} 元</div>
                </div>
            `).join('');
        }

        // 渲染活動清單 (藍色風格卡片)
        function renderEvents(data) {
            const list = document.getElementById('eventResultsList');
            if (data.length === 0) {
                list.innerHTML = `<p class="text-xs text-gray-400 text-center py-2">暫無相關抽獎活動</p>`;
                return;
            }
            list.innerHTML = data.map(item => `
                <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100 hover:border-blue-300 transition space-y-1">
                    <div class="flex justify-between items-start">
                        <span class="font-semibold text-sm text-blue-900">【${item.brand}】</span>
                        ${item.end_date ? `<span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">至 ${item.end_date}</span>` : ''}
                    </div>
                    ${item.detail ? `<div class="text-xs text-gray-600 pl-1">${item.detail}</div>` : ''}
                    ${item.url ? `
                        <div class="pt-1 pl-1">
                            <a href="${item.url}" target="_blank" class="text-xs text-blue-600 hover:underline inline-flex items-center">
                                前往活動登錄 🔗
                            </a>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 關鍵字連動搜尋：同時過濾飲料與活動
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            
            // 過濾飲料
            const filteredDrinks = allDrinks.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.price.toString().includes(keyword) ||
                (item.remark && item.remark.toLowerCase().includes(keyword))
            );
            
            // 過濾活動
            const filteredEvents = allEvents.filter(item => 
                item.brand.toLowerCase().includes(keyword) ||
                (item.detail && item.detail.toLowerCase().includes(keyword))
            );

            renderDrinks(filteredDrinks);
            renderEvents(filteredEvents);
        });

        // 切換飲料/活動表單的分流 UI
        function switchForm(type) {
            const isDrink = type === 'drink';
            document.getElementById('drinkForm').classList.toggle('hidden', !isDrink);
            document.getElementById('eventForm').classList.toggle('hidden', isDrink);
            
            document.getElementById('tabDrink').className = isDrink ? "flex-1 text-center pb-2 text-sm font-medium border-b-2 border-green-500 text-green-600" : "flex-1 text-center pb-2 text-sm font-medium border-b-2 border-transparent text-gray-400";
            document.getElementById('tabEvent').className = !isDrink ? "flex-1 text-center pb-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600" : "flex-1 text-center pb-2 text-sm font-medium border-b-2 border-transparent text-gray-400";
        }

        // 核心提交處理邏輯
        async function submitFormLogic(e, type) {
            e.preventDefault(); 
            
            const formData = new FormData(e.target);
            const dataObj = Object.fromEntries(formData.entries());
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "正在安全傳送中...";
            submitBtn.disabled = true;

            try {
                let error;

                if (type === 'drink') {
                    const { error: drinkError } = await supabaseClient
                        .from('drink_submissions')
                        .insert([{
                            name: dataObj.name,
                            price: parseInt(dataObj.price, 10),
                            remark: dataObj.remark || null,
                            status: 'pending' 
                        }]);
                    error = drinkError;
                } else {
                    const { error: eventError } = await supabaseClient
                        .from('event_submissions')
                        .insert([{
                            brand: dataObj.brand,
                            url: dataObj.url,
                            end_date: dataObj.end_date || null,
                            detail: dataObj.detail || null,
                            status: 'pending' 
                        }]);
                    error = eventError;
                }

                if (error) throw error;

                alert("🎉 回報成功！資料已安全送往管理員審核佇列。");
                e.target.reset();

            } catch (err) {
                console.error("提交失敗詳細紀錄：", err);
                alert(`傳送失敗：${err.message || '請檢查網路連線或資料庫權限'}`);
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        }

        // 綁定表單提交
        document.getElementById('drinkForm').addEventListener('submit', function(e) {
            submitFormLogic(e, 'drink');
        });

        document.getElementById('eventForm').addEventListener('submit', function(e) {
            submitFormLogic(e, 'event');
        });

        window.onload = initData;
    </script>
</body>
</html>
