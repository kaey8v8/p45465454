<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-11 飲料抽抽樂情報站</title>
    <!-- 使用 Tailwind CSS 快速美化手機排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase 官方 CDN 腳本 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-12">

    <!-- 導覽列與後台入口 -->
    <header class="bg-white shadow-sm sticky top-0 z-10 border-b border-gray-150">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold text-green-600 flex items-center gap-1.5">
                🥤 <span>7-11 飲料抽抽樂情報站</span>
            </h1>
            <a href="admin.html" class="text-xs text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition inline-flex items-center gap-1.5">
                <svg style="width:14px; height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                管理登入
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
        
        <!-- 區塊一：主看板大分頁切換（聯動下方回報區） -->
        <section class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="flex border-b border-gray-200 bg-gray-50/50">
                <button id="viewTabDrink" onclick="globalSwitch('drink')" class="flex-1 py-3 text-center text-sm font-bold border-b-2 border-green-500 text-green-600 transition">
                    🥤 適用商品查詢
                </button>
                <button id="viewTabEvent" onclick="globalSwitch('event')" class="flex-1 py-3 text-center text-sm font-medium border-b-2 border-transparent text-gray-400 transition">
                    🎁 品牌登錄活動
                </button>
                <button id="viewTabLucky" onclick="globalSwitch('lucky')" class="flex-1 py-3 text-center text-sm font-medium border-b-2 border-transparent text-gray-400 transition">
                    🎰 飲料抽抽樂
                </button>
                <button id="viewTabPending" onclick="globalSwitch('pending')" class="flex-1 py-3 text-center text-sm font-medium border-b-2 border-transparent text-gray-400 transition">
                    📝 待確認
                </button>
            </div>

            <div class="p-4 sm:p-6 space-y-4">
                <!-- 搜尋與新增按鈕列 -->
                <div id="searchBarControls" class="flex flex-col md:flex-row gap-2 items-stretch md:items-center">
                    <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋..." 
                           class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
                    
                    <!-- 摺疊篩選與排序控制按鈕 -->
                    <div id="filterToggleWrapper" class="flex items-center gap-2">
                        <!-- 飲料分頁專用：篩選與排序摺疊按鈕 -->
                        <button id="toggleFilterBtn" onclick="toggleCollapseFilter()" class="flex items-center gap-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold px-3 py-2 rounded-lg transition border border-gray-200 shadow-xs whitespace-nowrap">
                            <svg style="width:14px; height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="M21 21l-4.35-4.35"></path>
                            </svg>
                            <span> 篩選與排序</span>
                            <span id="toggleArrow" class="text-[10px] transition-transform duration-200">▼</span>
                        </button>

                        <!-- 活動分頁專用：直接外露的排序選擇器 -->
                        <div id="eventSortContainer" class="hidden flex items-center gap-1.5">
                            <span class="text-xs text-gray-500 font-bold">⇅ 排序:</span>
                            <button id="sortEventDateBtn" onclick="toggleEventDateSort(this)" class="px-3 py-1.5 border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 text-xs font-semibold rounded-lg transition flex items-center gap-1">
                              <span>截止日 ⇅</span>
                            </button>
                        </div>
                    </div>

                    <button onclick="openCreateModal()" id="openCreateBtn" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition whitespace-nowrap shadow-xs inline-flex items-center justify-center">
                        <span class="inline-flex items-center">
                            <svg style="width:14px; height:14px; margin-right:4px;" viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="5" stroke-linecap="round">
                                <path d="M10 3v14M3 10h14" />
                            </svg>
                            新增商品
                        </span>
                    </button>
                    
                </div>

                <!-- 飲料分類、糖分與排序 摺疊容器 -->
                <div id="drinkCollapseFilterContainer" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out bg-gray-50 rounded-xl border-0 border-transparent">
                    <div class="p-4 space-y-4 text-left">
                        <!-- 飲料大類 -->
                        <div class="space-y-1.5">
                            <div class="text-sm">🥛🧋🍹</div>
                            <div class="flex flex-wrap gap-2">
                                <button onclick="toggleFilterTag(this, '茶')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">茶</button>
                                <button onclick="toggleFilterTag(this, '水')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">水</button>
                                <button onclick="toggleFilterTag(this, '咖啡')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">咖啡</button>
                                <button onclick="toggleFilterTag(this, '能量飲')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">運動/能量飲</button>
                                <button onclick="toggleFilterTag(this, '乳/豆')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">乳/豆</button>
                                <button onclick="toggleFilterTag(this, '果汁')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">果汁</button>
                                <button onclick="toggleFilterTag(this, '其他')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">氣泡/碳酸</button>
                            </div>
                        </div>

                        <!-- 糖分篩選 -->
                        <div class="space-y-1.5">
                            <div class="text-sm">🍬</div>
                            <div class="flex flex-wrap gap-2">
                                <button onclick="toggleFilterTag(this, '有糖')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">有糖</button>
                                <button onclick="toggleFilterTag(this, '無糖')" class="drink-tag-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition">無糖</button>
                            </div>
                        </div>

                        <!-- 排序與重置控制列 -->
                        <div class="flex flex-wrap items-center justify-between gap-4 pt-2 border-t border-gray-200/60">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-gray-500">⇅ 排序:</span>
                                <div class="flex flex-wrap gap-1.5">
                                    <button id="sortPriceBtn" onclick="togglePriceSort(this)" class="drink-sort-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition flex items-center gap-1">
                                        <span>價格 ⇅</span>
                                    </button>
                                    <button id="sortDateBtn" onclick="toggleDateSort(this)" class="drink-sort-btn px-3 py-1 text-xs rounded-full border border-gray-200 bg-white text-gray-600 hover:bg-gray-100 transition flex items-center gap-1">
                                        <span>更新日期 ⇅</span>
                                    </button>
                                </div>
                            </div>
                            <button onclick="clearDrinkFilters()" class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition flex items-center gap-1">
                                <svg style="width:14px; height:14px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                                    <path d="M3 3v5h5" />
                                    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                                    <path d="M21 21v-5h-5" />
                                </svg>
                                重設所有篩選條件
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 飲料看板內容 -->
                <div id="drinkViewSection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <p class="col-span-full text-xs text-gray-400 text-center py-4">資料同步中...</p>
                </div>

                <!-- 活動看板內容 -->
                <div id="eventViewSection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden">
                    <p class="col-span-full text-xs text-gray-400 text-center py-4">資料同步中...</p>
                </div>

                <!-- 等待審核清單看板內容 (Table 表格排版) -->
                <div id="pendingViewSection" class="hidden overflow-x-auto border border-gray-200 rounded-xl">
                    <table class="min-w-full divide-y divide-gray-200 text-left text-xs">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-4 py-3 font-semibold text-gray-500">建立時間</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-gray-500">品名 / 品牌</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-gray-500">更新項目 / 詳情</th>
                                <th scope="col" class="px-4 py-3 font-semibold text-gray-500">署名</th>
                            </tr>
                        </thead>
                        <tbody id="pendingTableBody" class="divide-y divide-gray-200 bg-white">
                            <tr>
                                <td colspan="4" class="px-4 py-8 text-center text-gray-400">資料同步中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div id="luckyViewSection" class="hidden space-y-4 max-w-2xl mx-auto">
                    <!-- 內容將由 JavaScript 動態渲染 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 新增商品/活動彈窗 (Modal) -->
    <div id="createModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl border border-gray-200 max-w-md w-full p-5 shadow-2xl overflow-y-auto max-h-[90vh] relative">
            <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                <h3 id="createModalTitle" class="font-bold text-gray-800 text-sm">✍️ 建立新商品</h3>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600 text-sm">✕</button>
            </div>

            <!-- 飲料新增表單 -->
            <form id="drinkForm" class="space-y-3 mt-4" onsubmit="submitFormLogic(event, 'drink')">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">商品名稱 *</label>
                    <input type="text" name="name" required placeholder="原萃日式綠茶" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">單瓶價格 *</label>
                    <input type="number" name="price" max="500" required placeholder="65" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-green-500">
                </div>
                <!-- 商品分類標籤 -->
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">🧋 商品分類 </label>
                    <div class="grid grid-cols-3 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]">
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="茶" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>茶</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="水" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>水</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="咖啡" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>咖啡</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="運動/能量飲" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>運動/能量飲</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="乳/豆" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>乳/豆</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="果汁" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>果汁</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="氣泡/碳酸" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>氣泡/碳酸</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="有糖" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>有糖</span>
                        </label>
                        <label class="flex items-center gap-1.5 p-1 hover:bg-gray-150 rounded cursor-pointer">
                            <input type="checkbox" name="drink_category_tags" value="無糖" onchange="syncCreateDrinkCategoryTags()" class="rounded text-green-600 focus:ring-green-400">
                            <span>無糖</span>
                        </label>
                    </div>
                </div>
                <!-- 飲料促銷/活動標籤複選框 -->
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">🎁 活動/促銷 </label>
                    <div class="grid grid-cols-2 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]">
                        <label class="flex items-center space-x-2 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="drink_tags" value="買一送一" onchange="syncCreateDrinkTags()" class="rounded text-amber-600 focus:ring-amber-500">
                            <span>買一送一</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="drink_tags" value="第二件半價" onchange="syncCreateDrinkTags()" class="rounded text-amber-600 focus:ring-amber-500">
                            <span>第二件半價</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="drink_tags" value="第二件折10元" onchange="syncCreateDrinkTags()" class="rounded text-amber-600 focus:ring-amber-500">
                            <span>第二件折10元</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="drink_tags" value="不確定有抽抽樂" onchange="syncCreateDrinkTags()" class="rounded text-amber-600 focus:ring-amber-500">
                            <span>不確定有抽抽樂</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-1 hover:bg-gray-100 rounded col-span-2">
                            <input type="checkbox" name="drink_tags" value="已無在架上看到" onchange="syncCreateDrinkTags()" class="rounded text-amber-600 focus:ring-amber-500">
                            <span>已無在架上看到</span>
                        </label>
                    </div>
                </div>
                <div>
                    <div id="createDrinkTagContainer" class="flex flex-wrap gap-1.5 p-2 bg-amber-50/50 border border-amber-100 rounded-lg min-h-[35px]">
                        <span class="text-[11px] text-gray-400 italic">標籤預覽</span>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">備註說明</label>
                    <textarea id="createDrinkRemark" name="remark" rows="2" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-green-500" placeholder="例如：特價只到本週日" oninput="syncCreateDrinkTags()"></textarea>
                </div>
                <!-- 署名欄位 (飲料) -->
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">✍️ 署名 (留空則預設匿名)</label>
                    <input type="text" name="user_name" placeholder="請輸入暱稱..." class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-green-500">
                </div>
                <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
                    <button type="button" onclick="closeCreateModal()" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs hover:bg-gray-200 transition font-medium">取消</button>
                    <button type="submit" class="px-4 py-1.5 bg-green-600 text-white font-semibold rounded-lg text-xs hover:bg-green-700 transition shadow-sm">提交商品審核</button>
                </div>
            </form>

            <!-- 活動新增表單 -->
            <form id="eventForm" class="space-y-3 mt-4 hidden" onsubmit="submitFormLogic(event, 'event')">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">品牌活動名稱 *</label>
                    <input type="text" name="brand" required placeholder="原萃金蓋" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">網址 *</label>
                    <input type="url" name="url" required placeholder="https://..." class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">開始日期</label>
                        <input type="text" name="start_date" placeholder="2026-01-01" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">結束日期 *</label>
                        <input type="text" name="end_date" placeholder="2026-01-01" required class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">🏷️ 標籤 </label>
                    <div class="grid grid-cols-3 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]">
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="登錄發票" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>登錄發票</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="瓶蓋序號" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>瓶蓋序號</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="罐底序號" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>罐底序號</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="需回函" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>需回函</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="需簡訊" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>需簡訊</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="立即抽" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>立即抽</span>
                        </label>
                        <label class="flex items-center space-x-1.5 cursor-pointer p-1 hover:bg-gray-100 rounded">
                            <input type="checkbox" name="event_tags" value="截止時間非23:59" onchange="syncCreateEventTags()" class="rounded text-rose-650 focus:ring-rose-400"> <span>截止時間非23:59</span>
                        </label>
                    </div>
                </div>
                <div>
                    <div id="createEventTagContainer" class="flex flex-wrap gap-1.5 p-2 bg-rose-50/50 border border-rose-100 rounded-lg min-h-[35px]">
                        <span class="text-[11px] text-gray-400 italic">標籤預覽</span>
                    </div>
                </div>
                <div>

    <!-- 核心 -->
    <script>
        const SUPABASE_URL = "https://ojwryrmifoimjkkumdst.supabase.co/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_aBjX88rDqNLETYznUHmFmw_3FcO0xbl";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allDrinks = [];
        let allEvents = [];
        let pendingList = []; // 存放所有 pending 狀態的待審資料
        let currentView = 'drink';
        
        let selectedDrinkTags = [];
        let selectedDrinkSortMode = ''; // 'price_desc', 'price_asc', 'date_asc', 'date_desc'

        function normalizeDate(dateStr) {
            if (!dateStr) return null;
            let clean = dateStr.trim().replace(/[\/\.]/g, '-');
            if (/^\d{8}$/.test(clean)) {
                clean = `${clean.substring(0,4)}-${clean.substring(4,6)}-${clean.substring(6,8)}`;
            }
            let parts = clean.split('-');
            if (parts.length === 3) {
                return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            }
            return clean;
        }

        async function initData() {
            try {
                // 原有 approved 資料抓取
                const [drinkRes, eventRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'approved'),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'approved')
                ]);

                allDrinks = drinkRes.data || [];
                allEvents = eventRes.data || [];

                // 獲取狀態為 pending 的飲料、活動與勘誤回報
                await fetchPendingData();

                filterAndRender();
            } catch (e) {
                console.error(e);
            }
        }

        // 拉取所有狀態為 pending 的資料並進行格式統一
        async function fetchPendingData() {
            try {
                const [drinkPend, eventPend, issuePend] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'pending'),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'pending'),
                    supabaseClient.from('issue_reports').select('*').eq('status', 'pending')
                ]);

                const drinks = (drinkPend.data || []).map(item => ({
                    id: item.id, // 保留原始 ID
                    source_table: 'drink_submissions', // 標記來源表
                    created_at: item.created_at,
                    name: `🥤 [新增商品] ${item.name}`,
                    details: `價格：${item.price} 元 | 類別：${item.category_tags || '無'} | 備註：${item.remark || '無'}`,
                    user_name: item.user_name || '匿名'
                }));

                const events = (eventPend.data || []).map(item => ({
                    id: item.id, // 保留原始 ID
                    source_table: 'event_submissions', // 標記來源表
                    created_at: item.created_at,
                    name: `🎁 [新增活動] ${item.brand}`,
                    details: `網址：${item.url} | 日期：${item.start_date || '即日'} ~ ${item.end_date} | 內容：${item.detail || '無'}`,
                    user_name: item.user_name || '匿名'
                }));

                const issues = (issuePend.data || []).map(item => {
                    const isDrink = item.target_type === 'drink';
                    const nameLabel = isDrink 
                        ? `🚨 [勘誤飲料] (ID: ${item.target_id}) ${item.drink_name || ''}` 
                        : `🚨 [勘誤活動] (ID: ${item.target_id}) ${item.event_brand || ''}`;
                    const detailLabel = isDrink
                        ? `修正價格：${item.drink_price || '無'} | 類別：${item.drink_category_tags || '無'} | 備註：${item.drink_remark || '無'}`
                        : `修正網址：${item.event_url || '無'} | 截止：${item.event_end_date || '無'} | 細節：${item.event_detail || '無'}`;
                    return {
                        created_at: item.created_at,
                        name: nameLabel,
                        details: detailLabel,
                        user_name: item.user_name || '匿名勘誤'
                    };
                });

                // 將三者合併，並按照建立時間從新到舊排序
                pendingList = [...drinks, ...events, ...issues].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            } catch (error) {
                console.error("無法載入待審資料: ", error);
            }
        }

        function toggleCollapseFilter() {
            const container = document.getElementById('drinkCollapseFilterContainer');
            const arrow = document.getElementById('toggleArrow');

        function filterAndRender() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();

            if (currentView === 'drink') {
                let filtered = [...allDrinks];

                if (selectedDrinkTags.length > 0) {
                    filtered = filtered.filter(item => {
                        const searchTarget = `${item.name} ${item.category_tags || ''} ${item.remark || ''}`.toLowerCase();
                        return selectedDrinkTags.every(tag => searchTarget.includes(tag.toLowerCase()));
                    });
                }

                if (keyword) {
                    filtered = filtered.filter(item => 
                        item.name.toLowerCase().includes(keyword) || 
                        item.price.toString().includes(keyword) ||
                        (item.category_tags && item.category_tags.toLowerCase().includes(keyword)) ||
                        (item.remark && item.remark.toLowerCase().includes(keyword))
                    );
                }

                if (selectedDrinkSortMode === 'price_desc') {
                    filtered.sort((a, b) => b.price - a.price);
                } else if (selectedDrinkSortMode === 'price_asc') {
                    filtered.sort((a, b) => a.price - b.price);
                } else if (selectedDrinkSortMode === 'date_asc') {
                    filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                } else if (selectedDrinkSortMode === 'date_desc') {
                    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                } else {
                    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                }

                renderDrinks(filtered);
            } else if (currentView === 'event') {
                let filtered = [...allEvents];
                if (keyword) {
                    filtered = filtered.filter(item => 
                        item.brand.toLowerCase().includes(keyword) || 
                        (item.detail && item.detail.toLowerCase().includes(keyword))
                    );
                }

                filtered.sort((a, b) => {
                    const dateA = a.end_date ? new Date(a.end_date) : new Date('9999-12-31');
                    const dateB = b.end_date ? new Date(b.end_date) : new Date('9999-12-31');
                    return eventDateDirection === 'near' ? dateA - dateB : dateB - dateA;
                });

                renderEvents(filtered);
            } else {
                // 待審名單過濾
                let filtered = [...pendingList];
                if (keyword) {
                    filtered = filtered.filter(item => 
                        item.name.toLowerCase().includes(keyword) || 
                        item.details.toLowerCase().includes(keyword) || 
                        item.user_name.toLowerCase().includes(keyword)
                    );
                }
                renderPending(filtered);
            }
        }

        function renderPending(data) {

        async function submitFormLogic(e, type) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "提交中...";
        
            try {
                let payload = { 
                    target_type: type, 
                    report_type: 'new',
                    status: 'pending',
                    user_name: e.target.querySelector('[name="user_name"]').value.trim() || '匿名'
                };
        
                if (type === 'drink') {
                    const name = e.target.querySelector('[name="name"]').value;
                    const price = parseInt(e.target.querySelector('[name="price"]').value, 10);
                    
                    if (price > 500) {
                        alert("❌ 安全警告：單瓶飲料價格不可能大於 500 元！");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "提交飲料審核";
                        return;
                    }
        
                    const checkedCategoryTags = [];
                    document.querySelectorAll('#drinkForm input[name="drink_category_tags"]').forEach(cb => {
                        if (cb.checked) checkedCategoryTags.push(cb.value);
                    });
        
                    payload.drink_name = name;
                    payload.drink_price = price;
                    payload.drink_category_tags = checkedCategoryTags.join(',') || null;
                    payload.drink_remark = document.getElementById('createDrinkRemark').value.trim() || null;
        
                } else {
                    const brand = e.target.querySelector('[name="brand"]').value;
                    const url = e.target.querySelector('[name="url"]').value;
                    const start_date = normalizeDate(e.target.querySelector('[name="start_date"]').value);
                    const end_date = normalizeDate(e.target.querySelector('[name="end_date"]').value);
                    
                    payload.event_brand = brand;
                    payload.event_url = url;
                    payload.event_start_date = start_date;
                    payload.event_end_date = end_date;
                    payload.event_detail = document.getElementById('createEventDetail').value.trim() || null;
                }
        
                // 改為一律寫入 issue_reports 表
                const { error } = await supabaseClient.from('issue_reports').insert([payload]);
                
                if (error) throw error;
        
                alert("🎉 提交成功！資料已送往審核區，管理員確認後會進行更新。");
                closeCreateModal();
                await fetchPendingData(); // 即時重整畫面上的「待審名單」
                filterAndRender();
                
            } catch(err) { 
                alert(`提交失敗：${err.message}`); 
            } finally { 
                submitBtn.disabled = false; 
                submitBtn.innerText = type === 'drink' ? "提交飲料審核" : "提交活動審核";
            }
        }

            e.preventDefault();

            const type = document.getElementById('issueTargetType').value;
            const id = parseInt(document.getElementById('issueTargetId').value, 10);
            
            submitBtn.disabled = true;
            submitBtn.innerText = "傳送中...";

            try {
                let payload = { target_type: type, target_id: id, status: 'pending' };

                // 🌟 擷取共通或各自的署名欄位
                const user_name = e.target.querySelector('[name="user_name"]').value.trim() || null;
                payload.user_name = user_name;

                if (type === 'drink') {
                    const price = parseInt(e.target.querySelector('[name="drink_price"]').value, 10);
                    if (price > 500) {
                        alert("❌ 價格不得大於 500 元！");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "送出勘誤";
                        return;
                    }

                    const checkedCategoryTags = [];
                    document.querySelectorAll('#issueForm input[name="issue_drink_category_tags"]').forEach(cb => {
                        if (cb.checked) checkedCategoryTags.push(cb.value);
                    });

                    payload.drink_name = e.target.querySelector('[name="drink_name"]').value;
                    payload.drink_price = price;
                    payload.drink_category_tags = checkedCategoryTags.join(',') || null;
                    payload.drink_remark = document.getElementById('issueDrinkRemark').value.trim() || null;
                } else {
                    payload.event_brand = e.target.querySelector('[name="event_brand"]').value;
                    payload.event_url = e.target.querySelector('[name="event_url"]').value;
                    payload.event_start_date = normalizeDate(e.target.querySelector('[name="event_start_date"]').value);
                    payload.event_end_date = normalizeDate(e.target.querySelector('[name="event_end_date"]').value);
                    payload.event_detail = document.getElementById('issueEventDetail').value.trim() || null;
                }

                const { error } = await supabaseClient.from('issue_reports').insert([payload]);
                if (error) throw error;

                alert("🚨 勘誤回報成功！管理員已收到修正資訊。");

        // 🌟 修復：自動比對當前時間，抓出符合的活動區間資訊
        function getCurrentTimeline(timelines) {
            if (!timelines || timelines.length === 0) return { activeStr: "載入中...", redeemStr: "載入中..." };
            const now = new Date();
            // 尋找第一個當前時間尚未超過結束時間的活動時程
            let match = timelines.find(t => now <= new Date(t.end));
            // 如果所有活動時間都過期了，預設回傳最後一筆
            return match || timelines[timelines.length - 1];
        }

                alert("❤️ 您已經對這個商品按過讚囉！");

            const drink = allDrinks.find(d => d.id === id);

            drink.likes = (drink.likes || 0) + 1;
            filterAndRender();
        
            localStorage.setItem(storageKey, 'true');
        
            const { error } = await supabaseClient
                .from('drink_submissions')
                .update({ likes: drink.likes })
                .eq('id', id);
        
            if (error) {
                console.error("更新讚數失敗:", error);
                drink.likes -= 1;
                localStorage.removeItem(storageKey);
                filterAndRender();
            }

                            </svg>
                          </button>
                          
                          <button onclick="toggleLikeDrink(${item.id})" 
                                  class="${heartColorClass} hover:scale-120 active:scale-90 transition-all p-0.5 cursor-pointer flex flex-col items-center justify-center group" 
                                  title="喜歡這個商品">
                              <svg class="w-5 h-5 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                              </svg>
                              <span class="text-[10px] font-extrabold font-mono mt-0.5 text-gray-500 group-hover:text-red-500">${likesCount}</span>
                          </button>
                          
                          ${authorHTML}
                      </div>
                  </div>
              `;
            }).join('');
        }
    </script>
</body>
</html>
