<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員審核後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12 flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold text-gray-700">⚙️ 抽抽樂情報管理與審核後台</h1>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-xs text-blue-500 border border-blue-200 px-3 py-1.5 rounded hover:bg-blue-50">返回首頁</a>
                <button onclick="logout()" id="logoutBtn" class="hidden text-xs text-red-500 border border-red-200 px-3 py-1.5 rounded hover:bg-red-50">登出</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-6 flex-1 w-full">
        <section id="loginSection" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-sm space-y-4">
            <h2 class="font-semibold text-gray-700 text-center text-base">🔑 管理員認證</h2>
            <div class="space-y-2">
                <input type="text" id="adminUsername" placeholder="管理員帳號..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="password" id="adminPassword" placeholder="管理員密碼..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition">
                登入管理後台
            </button>
        </section>

        <div id="workSection" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <section class="lg:col-span-7 bg-white p-6 rounded-xl shadow-sm space-y-6">
                <div class="border-b pb-3">
                    <h2 class="text-lg font-bold text-gray-800">📋 現有上架資料庫</h2>
                    <p class="text-xs text-gray-400">在此檢視或手動編輯目前前台顯示的內容</p>
                </div>

                <div class="flex space-x-2 border-b border-gray-200 pb-px">
                    <button id="tabDrink" onclick="switchActiveTab('drink')" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600">
                        🍹 飲料品項 (<span id="countActiveDrinks">0</span>)
                    </button>
                    <button id="tabEvent" onclick="switchActiveTab('event')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        🎉 活動資訊 (<span id="countActiveEvents">0</span>)
                    </button>
                </div>

                <div id="drinkListContainer" class="space-y-3 max-h-[600px] overflow-y-auto pr-1"></div>

                <div id="eventListContainer" class="space-y-3 max-h-[600px] overflow-y-auto pr-1 hidden"></div>
            </section>

            <section class="lg:col-span-5 bg-white p-6 rounded-xl shadow-sm space-y-4">
                <div class="flex justify-between items-center border-b pb-3">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">📥 使用者錯誤勘誤回報</h2>
                        <p class="text-xs text-gray-400">處理勘誤、提案或一鍵覆蓋更新</p>
                    </div>
                    <span id="pendingCount" class="bg-red-100 text-red-700 text-xs px-2.5 py-1 rounded-full font-bold">0</span>
                </div>

                <div id="reportListContainer" class="space-y-4 max-h-[650px] overflow-y-auto pr-1"></div>
            </section>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl space-y-4 relative max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800">✏️ 編輯項目</h3>
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-lg">✕</button>

            <form id="editForm" class="space-y-3" onsubmit="event.preventDefault();">
                <input type="hidden" id="editItemType">
                <input type="hidden" id="editItemId">

                <div id="modalDrinkFields" class="space-y-3 hidden">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">品項名稱</label>
                        <input type="text" id="modalDrinkName" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">價格</label>
                        <input type="number" id="modalDrinkPrice" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">優惠活動限制 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-lg border border-gray-150 text-xs">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="買一送一" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>買一送一</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="第二件半價" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>第二件半價</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="第二件折10元" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>第二件折10元</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="單杯特價" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>單杯特價</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="不確定有抽抽樂" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>不確定有抽抽樂</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="已無在架上看到" onchange="syncDrinkTagsToRemark()" class="rounded text-blue-600">
                                <span>已無在架上看到</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">其他備註說明</label>
                        <textarea id="modalDrinkRemark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="勾選上方標籤將會自動填入此處，您也可以在後方加註說明。"></textarea>
                    </div>
                </div>

                <div id="modalEventFields" class="space-y-3 hidden">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">品牌</label>
                        <input type="text" id="modalEventBrand" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動網址</label>
                        <input type="url" id="modalEventUrl" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">開始日期</label>
                            <input type="text" id="modalEventStartDate" placeholder="如：2026-01-01" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">截止日期</label>
                            <input type="text" id="modalEventEndDate" placeholder="如：2026-12-31" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動限制 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-lg border border-gray-150 text-xs">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="登錄發票" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>登錄發票</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="瓶蓋序號" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>瓶蓋序號</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="罐底序號" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>罐底序號</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="需回函" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>需回函</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="需簡訊" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>需簡訊</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="立即抽" onchange="syncEventTagsToDetail()" class="rounded text-blue-600">
                                <span>立即抽</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動細節說明</label>
                        <textarea id="modalEventDetail" rows="3" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="勾選上方標籤將會自動填入此處，您也可以在後方加註說明。"></textarea>
                    </div>
                </div>

                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal()" class="w-1/2 bg-gray-100 hover:bg-gray-200 text-gray-600 py-2 rounded-lg text-sm font-medium">取消</button>
                    <button type="button" onclick="saveEdit()" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium">儲存更新</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🛠 Supabase 設定
        const YOUR_SUPABASE_URL = "https://akxaulhkzlckkaxdthxo.supabase.co"; 
        const YOUR_SUPABASE_ANON_KEY = "sb_publishable_LP-Jf6ygyLe4rKNVeqS83A_E5jmMzw0";

        const supabaseClient = supabase.createClient(YOUR_SUPABASE_URL, YOUR_SUPABASE_ANON_KEY);
        
        let localDrinks = [];
        let localEvents = [];
        let localReports = [];
        let currentTab = "drink";

        // 登入邏輯
        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!username || !password) {
                alert("請完整輸入帳號與密碼！");
                return;
            }

            const fakeEmail = username.includes('@') ? username : `${username}@fakeadmin.com`;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) throw error;

                showMainWorkspace();
            } catch (e) {
                alert(`登入失敗：${e.message || '密碼錯誤或帳號不存在'}`);
            }
        }

        // 登出邏輯
        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('workSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminPassword').value = "";
        }

        function showMainWorkspace() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('workSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            refreshAllData();
        }

        // 核心：刷新整頁所有資料
        async function refreshAllData() {
            try {
                const [drinksRes, eventsRes, reportsRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'approved').order('id', { ascending: false }),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'approved').order('id', { ascending: false }),
                    supabaseClient.from('issue_reports').select('*').eq('status', 'pending').order('created_at', { ascending: true })
                ]);

                if (drinksRes.error) throw drinksRes.error;
                if (eventsRes.error) throw eventsRes.error;
                if (reportsRes.error) throw reportsRes.error;

                localDrinks = drinksRes.data || [];
                localEvents = eventsRes.data || [];
                localReports = reportsRes.data || [];

                document.getElementById('countActiveDrinks').innerText = localDrinks.length;
                document.getElementById('countActiveEvents').innerText = localEvents.length;
                document.getElementById('pendingCount').innerText = localReports.length;

                renderActiveLists();
                renderReportsList();

            } catch (e) {
                console.error(e);
                alert("撈取資料時出錯，請檢查權限設定！");
            }
        }

        // 切換左側頁籤 (飲料 / 活動)
        function switchActiveTab(tab) {
            currentTab = tab;
            const tabDrink = document.getElementById('tabDrink');
            const tabEvent = document.getElementById('tabEvent');
            const drinkContainer = document.getElementById('drinkListContainer');
            const eventContainer = document.getElementById('eventListContainer');

            if (tab === 'drink') {
                tabDrink.className = "px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600";
                tabEvent.className = "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700";
                drinkContainer.classList.remove('hidden');
                eventContainer.classList.add('hidden');
            } else {
                tabDrink.className = "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700";
                tabEvent.className = "px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600";
                drinkContainer.classList.add('hidden');
                eventContainer.classList.remove('hidden');
            }
        }

        // 渲染左側前台品項
        function renderActiveLists() {
            const drinkContainer = document.getElementById('drinkListContainer');
            const eventContainer = document.getElementById('eventListContainer');

            // 1. 飲料
            if (localDrinks.length === 0) {
                drinkContainer.innerHTML = `<p class="text-xs text-gray-400 text-center py-6">目前前台無上架飲料品項</p>`;
            } else {
                drinkContainer.innerHTML = localDrinks.map(d => `
                    <div class="p-3.5 bg-gray-50 rounded-lg border border-gray-150 flex justify-between items-center hover:bg-gray-100/70 transition">
                        <div>
                            <div class="font-semibold text-gray-800 text-sm">${d.name} <span class="text-green-600 text-xs ml-1 font-bold">${d.price} 元</span></div>
                            <div class="text-xs text-gray-400 mt-0.5 max-w-[300px] truncate">備註: ${d.remark || '無'}</div>
                        </div>
                        <button onclick="openEditModal('drink', ${d.id})" class="text-xs bg-white text-gray-600 hover:text-blue-600 border border-gray-200 px-2.5 py-1.5 rounded-lg shadow-xs flex items-center gap-1 transition">
                            ✏️ 編輯
                        </button>
                    </div>
                `).join('');
            }

            // 2. 活動
            if (localEvents.length === 0) {
                eventContainer.innerHTML = `<p class="text-xs text-gray-400 text-center py-6">目前前台無上架活動</p>`;
            } else {
                eventContainer.innerHTML = localEvents.map(ev => `
                    <div class="p-3.5 bg-gray-50 rounded-lg border border-gray-150 flex justify-between items-center hover:bg-gray-100/70 transition">
                        <div class="flex-1 min-w-0 pr-4">
                            <div class="font-semibold text-gray-800 text-sm truncate">${ev.brand}</div>
                            <div class="text-xs text-gray-400 mt-0.5">時間: ${ev.start_date || '未填'} ~ ${ev.end_date || '未填'}</div>
                        </div>
                        <button onclick="openEditModal('event', ${ev.id})" class="text-xs bg-white text-gray-600 hover:text-blue-600 border border-gray-200 px-2.5 py-1.5 rounded-lg shadow-xs flex items-center gap-1 transition">
                            ✏️ 編輯
                        </button>
                    </div>
                `).join('');
            }
        }

        // 渲染右側使用者勘誤回報
        function renderReportsList() {
            const reportContainer = document.getElementById('reportListContainer');
            if (localReports.length === 0) {
                reportContainer.innerHTML = `<p class="text-sm text-green-600 text-center py-8 font-medium">🎉 目前沒有任何使用者回報需要審核！</p>`;
                return;
            }

            reportContainer.innerHTML = localReports.map(rep => {
                const targetTypeLabel = rep.target_type === 'drink' ? '🍹 飲料勘誤' : '🎉 活動勘誤';
                
                let originalContent = "查無或已被刪除";
                if (rep.target_type === 'drink') {
                    const matched = localDrinks.find(item => item.id === rep.target_id);
                    if (matched) originalContent = `名稱: ${matched.name} (${matched.price}元) / 備註: ${matched.remark || '無'}`;
                } else {
                    const matched = localEvents.find(item => item.id === rep.target_id);
                    if (matched) originalContent = `品牌: ${matched.brand} / 時間: ${matched.start_date || '未填'} ~ ${matched.end_date || '未填'}`;
                }

                let newReportedContent = "";
                if (rep.target_type === 'drink') {
                    newReportedContent = `
                        <div class="text-xs font-semibold text-amber-800">✍️ 回報更新內容：</div>
                        <div class="grid grid-cols-2 gap-2 text-xs mt-1">
                            <div class="bg-amber-100/50 p-1 rounded">品項：${rep.drink_name || '<span class="text-gray-400">未變更</span>'}</div>
                            <div class="bg-amber-100/50 p-1 rounded">價格：${rep.drink_price !== null ? rep.drink_price + ' 元' : '<span class="text-gray-400">未變更</span>'}</div>
                        </div>
                        <div class="text-xs text-amber-700 mt-2 bg-amber-50 p-1.5 rounded border border-amber-100">
                            <strong>原因/備註：</strong>${rep.drink_remark || '無'}
                        </div>
                    `;
                } else {
                    newReportedContent = `
                        <div class="text-xs font-semibold text-amber-800">✍️ 回報更新內容：</div>
                        <div class="space-y-1 text-xs mt-1">
                            <div class="bg-amber-100/50 p-1 rounded truncate">品牌：${rep.event_brand || '<span class="text-gray-400">未變更</span>'}</div>
                            <div class="bg-amber-100/50 p-1 rounded truncate">網址：<a href="${rep.event_url || '#'}" target="_blank" class="text-blue-600 underline text-[10px] break-all">${rep.event_url || '未變更'}</a></div>
                            <div class="grid grid-cols-2 gap-1 bg-amber-100/50 p-1 rounded">
                                <div>開始：${rep.event_start_date || '<span class="text-gray-400">未變更</span>'}</div>
                                <div>結束：${rep.event_end_date || '<span class="text-gray-400">未變更</span>'}</div>
                            </div>
                        </div>
                        <div class="text-xs text-amber-700 mt-2 bg-amber-50 p-1.5 rounded border border-amber-100">
                            <strong>原因/備註：</strong>${rep.event_detail || '無'}
                        </div>
                    `;
                }

                return `
                    <div class="p-4 bg-amber-50/55 rounded-xl border border-amber-200 space-y-3 relative shadow-xs">
                        <div class="flex justify-between items-center">
                            <span class="bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded font-bold">${targetTypeLabel}</span>
                            <span class="text-[10px] text-gray-400">ID: ${rep.id}</span>
                        </div>
                        
                        <div class="text-xs bg-gray-100/80 p-2 rounded text-gray-500 border border-gray-200">
                            <strong class="text-gray-700 block">🔍 當前原資料庫內容：</strong>
                            ${originalContent}
                        </div>

                        <div class="space-y-1">
                            ${newReportedContent}
                        </div>

                        <div class="grid grid-cols-2 gap-2 pt-1 border-t border-amber-200/50">
                            <button onclick="ignoreReport(${rep.id})" class="bg-white hover:bg-gray-100 text-gray-600 text-xs font-medium py-1.5 rounded-lg border border-gray-200 transition">
                                ❌ 忽略
                            </button>
                            <button onclick="overwriteAndApprove(${rep.id})" class="bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold py-1.5 rounded-lg shadow-sm flex items-center justify-center gap-1 transition">
                                ⚡ 確認覆蓋原始資料
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 🛠️ 標籤與備註欄位即時同步邏輯 ====================

        // 飲料部分：當手動勾選核取方塊，即時重組並填入「其他備註說明」
        function syncDrinkTagsToRemark() {
            const checkboxes = document.querySelectorAll('input[name="modalDrinkTags"]');
            const textInput = document.getElementById('modalDrinkRemark');
            
            // 收集已勾選的標籤
            const selectedTags = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedTags.push(cb.value);
            });

            // 解析目前輸入框內的使用者自訂描述（排除舊有的標籤前綴）
            let currentText = textInput.value.trim();
            let customPart = "";

            if (currentText.includes('|')) {
                // 如果已有分割符，直接拿後半段自訂部分
                customPart = currentText.split('|')[1].trim();
            } else {
                // 如果沒有分割符，看是否有非標籤的文字
                let tempText = currentText;
                checkboxes.forEach(cb => {
                    tempText = tempText.replace(cb.value, "").replace(/[,，、|\s]/g, "");
                });
                if (tempText.length > 0) {
                    customPart = currentText;
                }
            }

            // 重組文字： 標籤, 標籤 | 自訂備註
            let tagsText = selectedTags.join(',');
            let finalText = tagsText;
            if (customPart) {
                finalText = tagsText ? `${tagsText} | ${customPart}` : customPart;
            }
            textInput.value = finalText;
        }

        // 活動部分：當手動勾選核取方塊，即時重組並填入「活動細節說明」
        function syncEventTagsToDetail() {
            const checkboxes = document.querySelectorAll('input[name="modalEventTags"]');
            const textInput = document.getElementById('modalEventDetail');

            const selectedTags = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedTags.push(cb.value);
            });

            let currentText = textInput.value.trim();
            let customPart = "";

            if (currentText.includes('|')) {
                customPart = currentText.split('|')[1].trim();
            } else {
                let tempText = currentText;
                checkboxes.forEach(cb => {
                    tempText = tempText.replace(cb.value, "").replace(/[,，、|\s]/g, "");
                });
                if (tempText.length > 0) {
                    customPart = currentText;
                }
            }

            let tagsText = selectedTags.join(',');
            let finalText = tagsText;
            if (customPart) {
                finalText = tagsText ? `${tagsText} | ${customPart}` : customPart;
            }
            textInput.value = finalText;
        }

        // ==================== 彈窗手動編輯邏輯 ====================
        function openEditModal(type, id) {
            document.getElementById('editItemType').value = type;
            document.getElementById('editItemId').value = id;

            // 初始化與清空所有核取方塊
            const drinkCheckboxes = document.querySelectorAll('input[name="modalDrinkTags"]');
            drinkCheckboxes.forEach(cb => cb.checked = false);

            const eventCheckboxes = document.querySelectorAll('input[name="modalEventTags"]');
            eventCheckboxes.forEach(cb => cb.checked = false);

            document.getElementById('modalDrinkFields').classList.add('hidden');
            document.getElementById('modalEventFields').classList.add('hidden');

            if (type === 'drink') {
                const item = localDrinks.find(d => d.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🍹 手動編輯：飲料品項";
                document.getElementById('modalDrinkFields').classList.remove('hidden');

                document.getElementById('modalDrinkName').value = item.name;
                document.getElementById('modalDrinkPrice').value = item.price;
                document.getElementById('modalDrinkRemark').value = item.remark || "";

                // ✨ 解析備註文字，自動打勾已存在的標籤
                if (item.remark) {
                    drinkCheckboxes.forEach(cb => {
                        // 比對不分分隔符號（如逗號、頓號、豎線）
                        if (item.remark.includes(cb.value)) {
                            cb.checked = true;
                        }
                    });
                }
            } else {
                const item = localEvents.find(ev => ev.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🎉 手動編輯：活動情報";
                document.getElementById('modalEventFields').classList.remove('hidden');

                document.getElementById('modalEventBrand').value = item.brand;
                document.getElementById('modalEventUrl').value = item.url;
                document.getElementById('modalEventStartDate').value = item.start_date || "";
                document.getElementById('modalEventEndDate').value = item.end_date || "";
                document.getElementById('modalEventDetail').value = item.detail || "";

                // ✨ 解析活動細節，自動打勾已存在的活動限制標籤
                if (item.detail) {
                    eventCheckboxes.forEach(cb => {
                        if (item.detail.includes(cb.value)) {
                            cb.checked = true;
                        }
                    });
                }
            }

            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editForm').reset();
        }

        // 手動編輯儲存提交
        async function saveEdit() {
            const type = document.getElementById('editItemType').value;
            const id = parseInt(document.getElementById('editItemId').value);

            let updatePayload = {};
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';

            if (type === 'drink') {
                updatePayload = {
                    name: document.getElementById('modalDrinkName').value.trim(),
                    price: parseInt(document.getElementById('modalDrinkPrice').value) || 0,
                    remark: document.getElementById('modalDrinkRemark').value.trim()
                };
            } else {
                updatePayload = {
                    brand: document.getElementById('modalEventBrand').value.trim(),
                    url: document.getElementById('modalEventUrl').value.trim(),
                    start_date: document.getElementById('modalEventStartDate').value.trim(),
                    end_date: document.getElementById('modalEventEndDate').value.trim(),
                    detail: document.getElementById('modalEventDetail').value.trim()
                };
            }

            try {
                const { error } = await supabaseClient
                    .from(targetTable)
                    .update(updatePayload)
                    .eq('id', id);

                if (error) throw error;

                closeModal();
                alert("修改成功！已更新回前台資料。");
                refreshAllData();

            } catch (e) {
                console.error(e);
                alert("儲存失敗：" + e.message);
            }
        }

        // ==================== 右側使用者回報處理邏輯 ====================

        // 1. 忽略回報
        async function ignoreReport(reportId) {
            if (!confirm("確定要忽略這筆勘誤回報嗎？原資料將不做變更。")) return;
            try {
                const { error } = await supabaseClient
                    .from('issue_reports')
                    .update({ status: 'rejected' })
                    .eq('id', reportId);

                if (error) throw error;
                alert("已忽略此回報。");
                refreshAllData();
            } catch (e) {
                console.error(e);
                alert("操作失敗：" + e.message);
            }
        }

        // 2. ⚡ 確認覆蓋原始資料 (核心覆蓋邏輯)
        async function overwriteAndApprove(reportId) {
            const report = localReports.find(rep => rep.id === reportId);
            if (!report) return;

            const targetId = report.target_id;
            const isDrink = report.target_type === 'drink';

            if (!confirm(`確定要將此使用者回報的新數值，直接覆蓋 ID ${targetId} 的原資料嗎？`)) return;

            try {
                let overwritePayload = {};
                const targetTable = isDrink ? 'drink_submissions' : 'event_submissions';

                if (isDrink) {
                    const original = localDrinks.find(d => d.id === targetId) || {};
                    overwritePayload = {
                        name: report.drink_name ? report.drink_name.trim() : original.name,
                        price: report.drink_price !== null ? report.drink_price : original.price,
                        remark: report.drink_remark ? report.drink_remark.trim() : original.remark
                    };
                } else {
                    const original = localEvents.find(e => e.id === targetId) || {};
                    overwritePayload = {
                        brand: report.event_brand ? report.event_brand.trim() : original.brand,
                        url: report.event_url ? report.event_url.trim() : original.url,
                        start_date: report.event_start_date ? report.event_start_date.trim() : original.start_date,
                        end_date: report.event_end_date ? report.event_end_date.trim() : original.end_date,
                        detail: report.event_detail ? report.event_detail.trim() : original.detail
                    };
                }

                // 2a. 更新目標原資料庫資料
                const updateOriginalRes = await supabaseClient
                    .from(targetTable)
                    .update(overwritePayload)
                    .eq('id', targetId);

                if (updateOriginalRes.error) throw updateOriginalRes.error;

                // 2b. 更新 `issue_reports` 的狀態
                const updateReportRes = await supabaseClient
                    .from('issue_reports')
                    .update({ 
                        status: 'approved'
                    })
                    .eq('id', reportId);

                if (updateReportRes.error) throw updateReportRes.error;

                alert("⚡ 覆蓋更新成功！原資料與審核狀態已全數同步完畢。");
                refreshAllData();

            } catch (e) {
                console.error(e);
                alert("覆蓋失敗：" + e.message);
            }
        }

        // 頁面初次載入
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showMainWorkspace();
            }
        };
    </script>
</body>
