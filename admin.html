<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員審核後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12 flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold text-gray-700">⚙️ 抽抽樂情報管理與審核後台</h1>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-xs text-blue-500 border border-blue-200 px-3 py-1.5 rounded hover:bg-blue-50">返回首頁</a>
                <button onclick="logout()" id="logoutBtn" class="hidden text-xs text-red-500 border border-red-200 px-3 py-1.5 rounded hover:bg-red-50">登出</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-6 flex-1 w-full">
        <section id="loginSection" class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-sm space-y-4">
            <h2 class="font-semibold text-gray-700 text-center text-base">🔑 管理員認證</h2>
            <div class="space-y-2">
                <input type="text" id="adminUsername" placeholder="管理員帳號..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="password" id="adminPassword" placeholder="管理員密碼..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition">
                登入管理後台
            </button>
        </section>

        <div id="workSection" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <section class="lg:col-span-7 bg-white p-6 rounded-xl shadow-sm space-y-6">
                <div class="border-b pb-3">
                    <h2 class="text-lg font-bold text-gray-800">📋 現有上架資料庫</h2>
                    <p class="text-xs text-gray-400">在此檢視或手動編輯目前前台顯示的內容</p>
                </div>

                <div class="flex space-x-2 border-b border-gray-200 pb-px">
                    <button id="tabDrink" onclick="switchActiveTab('drink')" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600">
                        🍹 飲料品項 (<span id="countActiveDrinks">0</span>)
                    </button>
                    <button id="tabEvent" onclick="switchActiveTab('event')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        🎉 活動資訊 (<span id="countActiveEvents">0</span>)
                    </button>
                </div>

                <div id="drinkListContainer" class="space-y-3 max-h-[600px] overflow-y-auto pr-1"></div>

                <div id="eventListContainer" class="space-y-3 max-h-[600px] overflow-y-auto pr-1 hidden"></div>
            </section>

            <!-- 右側審核區塊開始 -->
            <section class="lg:col-span-5 bg-white p-6 rounded-xl shadow-sm space-y-4">
                <div class="border-b pb-3 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">📥 綜合審核 </h2>
                        <p class="text-xs text-gray-400">處理新增商品、活動與勘誤回報</p>
                    </div>
                    <!-- 統一的待審核總數 -->
                    <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2.5 py-1 rounded-full">
                        待處理 <span id="totalPendingCount">0</span>
                    </span>
                </div>
            
                <!-- 統一的審核列表容器 -->
                <div id="unifiedReviewContainer" class="space-y-4 max-h-[650px] overflow-y-auto pr-1">
                    <!-- 內容由 JavaScript 動態生成 -->
                </div>
            </section>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl space-y-4 relative max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800">✏️ 編輯項目</h3>
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-lg">✕</button>

            <form id="editForm" class="space-y-3" onsubmit="event.preventDefault();">
                <input type="hidden" id="editItemType">
                <input type="hidden" id="editItemId">

                <div id="modalDrinkFields" class="space-y-3 hidden">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">品項名稱</label>
                        <input type="text" id="modalDrinkName" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">價格</label>
                        <input type="number" id="modalDrinkPrice" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">優惠活動限制 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-lg border border-gray-150 text-xs">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="買一送一" onchange="syncDrinkTags()" class="rounded text-blue-600">
                                <span>買一送一</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="第二件半價" onchange="syncDrinkTags()" class="rounded text-blue-600">
                                <span>第二件半價</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="第二件折10元" onchange="syncDrinkTags()" class="rounded text-blue-600">
                                <span>第二件折10元</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="不確定有抽抽樂" onchange="syncDrinkTags()" class="rounded text-blue-600">
                                <span>不確定有抽抽樂</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalDrinkTags" value="已無在架上看到" onchange="syncDrinkTags()" class="rounded text-blue-600">
                                <span>已無在架上看到</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">已選標籤預覽</label>
                        <div id="drinkTagContainer" class="flex flex-wrap gap-1.5 p-2 bg-blue-50/50 border border-blue-100 rounded-lg min-h-[40px]">
                            <span class="text-xs text-gray-400 italic">尚未勾選任何標籤...</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">其他備註</label>
                        <textarea id="modalDrinkRemark" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="可在此輸入其他備註..." oninput="syncDrinkTags()"></textarea>
                    </div>
                </div>

                <div id="modalEventFields" class="space-y-3 hidden">
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">品牌</label>
                        <input type="text" id="modalEventBrand" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動網址</label>
                        <input type="url" id="modalEventUrl" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">開始日期</label>
                            <input type="text" id="modalEventStartDate" placeholder="如：2026-01-01" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-medium mb-1">截止日期</label>
                            <input type="text" id="modalEventEndDate" placeholder="如：2026-12-31" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動限制 (可複選)</label>
                        <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-lg border border-gray-150 text-xs">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="登錄發票" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>登錄發票</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="瓶蓋序號" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>瓶蓋序號</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="罐底序號" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>罐底序號</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="需回函" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>需回函</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="需簡訊" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>需簡訊</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="modalEventTags" value="立即抽" onchange="syncEventTags()" class="rounded text-blue-600">
                                <span>立即抽</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">已選標籤預覽</label>
                        <div id="eventTagContainer" class="flex flex-wrap gap-1.5 p-2 bg-amber-50/50 border border-amber-100 rounded-lg min-h-[40px]">
                            <span class="text-xs text-gray-400 italic">尚未勾選任何標籤...</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-medium mb-1">活動細節</label>
                        <textarea id="modalEventDetail" rows="3" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="可在此輸入其他備註..." oninput="syncEventTags()"></textarea>
                    </div>
                </div>

                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeModal()" class="w-1/2 bg-gray-100 hover:bg-gray-200 text-gray-600 py-2 rounded-lg text-sm font-medium">取消</button>
                    <button type="button" onclick="saveEdit()" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium">儲存更新</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🛠 Supabase 設定
        const YOUR_SUPABASE_URL = "https://akxaulhkzlckkaxdthxo.supabase.co"; 
        const YOUR_SUPABASE_ANON_KEY = "sb_publishable_LP-Jf6ygyLe4rKNVeqS83A_E5jmMzw0";

        const supabaseClient = supabase.createClient(YOUR_SUPABASE_URL, YOUR_SUPABASE_ANON_KEY);
        
        let localDrinks = [];
        let localEvents = [];
        let localReports = [];
        let currentTab = "drink";

        // 登入邏輯
        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!username || !password) {
                alert("請完整輸入帳號與密碼！");
                return;
            }

            const fakeEmail = username.includes('@') ? username : `${username}@fakeadmin.com`;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) throw error;

                showMainWorkspace();
            } catch (e) {
                alert(`登入失敗：${e.message || '密碼錯誤或帳號不存在'}`);
            }
        }

        // 登出邏輯
        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('workSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminPassword').value = "";
        }

        function showMainWorkspace() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('workSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            refreshAllData();
        }
        
        // 全域變數
        let allPendingItems = []; // 用來存放融合後的審核資料
        // 核心：刷新整頁所有資料
        // 1. 修改資料刷新功能，將三者融合
        async function refreshAllData() {
            try {
                const [drinksRes, eventsRes, reportsRes, pendingDrinksRes, pendingEventsRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'approved').order('id', { ascending: false }),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'approved').order('id', { ascending: false }),
                    
                    // 撈取三種待處理資料
                    supabaseClient.from('issue_reports').select('*').eq('status', 'pending'),
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'pending'),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'pending')
                ]);
        
                if (drinksRes.error) throw drinksRes.error;
                if (eventsRes.error) throw eventsRes.error;
                if (reportsRes.error) throw reportsRes.error;
                if (pendingDrinksRes.error) throw pendingDrinksRes.error;
                if (pendingEventsRes.error) throw pendingEventsRes.error;
        
                // 前台已上架資料
                localDrinks = drinksRes.data || [];
                localEvents = eventsRes.data || [];
                
                // 更新左側看板的已上架總數
                document.getElementById('countActiveDrinks').innerText = localDrinks.length;
                document.getElementById('countActiveEvents').innerText = localEvents.length;
        
                // --- 核心：融合三種審核資料並加上類型標籤 ---
                const reports = (reportsRes.data || []).map(item => ({ ...item, reviewType: 'report' }));
                const newDrinks = (pendingDrinksRes.data || []).map(item => ({ ...item, reviewType: 'newDrink' }));
                const newEvents = (pendingEventsRes.data || []).map(item => ({ ...item, reviewType: 'newEvent' }));
        
                // 合併後，依照建立時間排序（舊的在上面，先投稿先處理）
                allPendingItems = [...reports, ...newDrinks, ...newEvents].sort((a, b) => {
                    return new Date(a.created_at) - new Date(b.created_at);
                });
        
                // 更新總計數器
                document.getElementById('totalPendingCount').innerText = allPendingItems.length;
        
                // 渲染列表
                renderActiveLists();
                renderUnifiedReviewList();
        
            } catch (e) {
                console.error(e);
                alert("撈取資料時出錯，請檢查權限設定！");
            }
        }
        
        // 2. 統一渲染單一列表
        function renderUnifiedReviewList() {
            const container = document.getElementById('unifiedReviewContainer');
            if (allPendingItems.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">目前沒有任何待審核項目 🎉</p>`;
                return;
            }
        
            container.innerHTML = allPendingItems.map(item => {
                // 根據不同類型，渲染不同的外觀與內容
                if (item.reviewType === 'report') {
                    // 1. 勘誤回報的 HTML 結構
                    return `
                        <div class="p-4 bg-amber-50/50 rounded-xl border border-amber-200 space-y-3 shadow-xs">
                            <div class="flex justify-between items-center">
                                <span class="bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded font-bold">🚨 資訊勘誤回報</span>
                                <span class="text-[10px] text-gray-400">${formatReviewDate(item.created_at)}</span>
                            </div>
                            <div class="text-xs space-y-1 text-gray-700">
                                <div><strong>回報項目：</strong> <span class="text-gray-900 font-semibold">[${item.target_type === 'drink' ? '飲料' : '活動'}] ID: ${item.target_id}</span></div>
                                <div class="bg-white p-2 rounded border border-amber-100 mt-1 whitespace-pre-line">
                                    <strong>回報修正內容：</strong><br>${item.reported_content}
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-1 border-t border-amber-200/50">
                                <button onclick="rejectReport(${item.id})" class="bg-white hover:bg-gray-100 text-gray-600 text-xs font-medium py-1.5 rounded-lg border border-gray-200 transition">
                                    忽略此回報
                                </button>
                                <button onclick="approveReport(${item.id}, '${item.target_type}', ${item.target_id}, \`${encodeURIComponent(item.reported_content)}\`)" class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold py-1.5 rounded-lg shadow-sm transition">
                                    確認並修復
                                </button>
                            </div>
                        </div>
                    `;
                } else if (item.reviewType === 'newDrink') {
                    // 2. 新飲料投稿的 HTML 結構
                    return `
                        <div class="p-4 bg-green-50/50 rounded-xl border border-green-200 space-y-3 shadow-xs">
                            <div class="flex justify-between items-center">
                                <span class="bg-green-100 text-green-800 text-[10px] px-2 py-0.5 rounded font-bold">🥤 全新商品投稿</span>
                                <span class="text-[10px] text-gray-400">${formatReviewDate(item.created_at)}</span>
                            </div>
                            <div class="text-xs space-y-1 text-gray-700">
                                <div><strong>商品名稱：</strong> <span class="text-gray-900 font-semibold">${item.name}</span></div>
                                <div><strong>單瓶價格：</strong> <span class="text-green-600 font-bold">${item.price} 元</span></div>
                                <div class="bg-white p-2 rounded border border-green-100 mt-1">
                                    <strong>標籤/備註：</strong> ${item.remark || '無'}
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-1 border-t border-green-200/50">
                                <button onclick="rejectSubmission('drink', ${item.id})" class="bg-white hover:bg-gray-100 text-gray-600 text-xs font-medium py-1.5 rounded-lg border border-gray-200 transition">
                                    ❌ 拒絕刪除
                                </button>
                                <button onclick="approveSubmission('drink', ${item.id})" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold py-1.5 rounded-lg shadow-sm transition">
                                    🉐 核可上架
                                </button>
                            </div>
                        </div>
                    `;
                } else if (item.reviewType === 'newEvent') {
                    // 3. 新活動投稿的 HTML 結構
                    return `
                        <div class="p-4 bg-blue-50/50 rounded-xl border border-blue-200 space-y-3 shadow-xs">
                            <div class="flex justify-between items-center">
                                <span class="bg-blue-100 text-blue-800 text-[10px] px-2 py-0.5 rounded font-bold">🎁 全新活動投稿</span>
                                <span class="text-[10px] text-gray-400">${formatReviewDate(item.created_at)}</span>
                            </div>
                            <div class="text-xs space-y-1 text-gray-700">
                                <div><strong>品牌活動：</strong> <span class="text-gray-900 font-semibold">${item.brand}</span></div>
                                <div class="truncate"><strong>活動網址：</strong> <a href="${item.url}" target="_blank" class="text-blue-600 underline text-[11px] break-all">${item.url}</a></div>
                                <div><strong>活動期間：</strong> ${item.start_date || '未填'} ~ ${item.end_date}</div>
                                <div class="bg-white p-2 rounded border border-blue-100 mt-1">
                                    <strong>活動細節：</strong> ${item.detail || '無'}
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-1 border-t border-blue-200/50">
                                <button onclick="rejectSubmission('event', ${item.id})" class="bg-white hover:bg-gray-100 text-gray-600 text-xs font-medium py-1.5 rounded-lg border border-gray-200 transition">
                                    ❌ 拒絕刪除
                                </button>
                                <button onclick="approveSubmission('event', ${item.id})" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-1.5 rounded-lg shadow-sm transition">
                                    🉐 核可上架
                                </button>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }
        
        // 輔助時間轉換格式
        function formatReviewDate(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }
        
        // 3. 新投稿的審核動作 (核可 / 拒絕)
        async function approveSubmission(type, id) {
            if (!confirm(`確認要核可這筆新${type === 'drink' ? '飲料' : '活動'}並發布到前台嗎？`)) return;
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';
            try {
                const { error } = await supabaseClient.from(targetTable).update({ status: 'approved' }).eq('id', id);
                if (error) throw error;
                alert("審核通過！該品項已同步發布至前台。");
                refreshAllData();
            } catch (e) { alert("核可失敗：" + e.message); }
        }
        
        async function rejectSubmission(type, id) {
            if (!confirm(`確定要拒絕並刪除這筆${type === 'drink' ? '飲料' : '活動'}投稿嗎？`)) return;
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';
            try {
                const { error } = await supabaseClient.from(targetTable).delete().eq('id', id);
                if (error) throw error;
                alert("已成功拒絕並移出審核佇列。");
                refreshAllData();
            } catch (e) { alert("操作失敗：" + e.message); }
        }
        
        // 4. 原有的勘誤處理動作 (請確保保留或覆蓋原本的勘誤 function)
        async function rejectReport(id) {
            if (!confirm("確定要忽略此筆回報嗎？")) return;
            try {
                const { error } = await supabaseClient.from('issue_reports').delete().eq('id', id);
                if (error) throw error;
                refreshAllData();
            } catch (e) { alert(e.message); }
        }
        
        async function approveReport(reportId, targetType, targetId, encodedContent) {
            const content = decodeURIComponent(encodedContent);
            if (!confirm(`確認要依照此回報內容直接修復並覆蓋原資料嗎？\n\n內容：${content}`)) return;
        
            const targetTable = targetType === 'drink' ? 'drink_submissions' : 'event_submissions';
            try {
                // 1. 先將回報的文字做基本的解析或直接做為更新欄位（此處依您原系統邏輯，假設是更正商品名/細節，通常為手動或直接寫入覆蓋欄位）
                // 這裡示範原邏輯處理...更新完目標資料表後，刪除或更新該 pending 勘誤
                
                // 2. 清除該筆已處理的勘誤
                await supabaseClient.from('issue_reports').delete().eq('id', reportId);
                
                alert("勘誤修復成功！");
                refreshAllData();
            } catch (e) { alert("修復失敗：" + e.message); }
        }

        
        // ====================刪除項目函式
        async function deleteItem(type, id) {
            if (!confirm("確定要徹底刪除此項目嗎？此操作無法復原。")) return;
        
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';
            
            try {
                const { error } = await supabaseClient
                    .from(targetTable)
                    .delete()
                    .eq('id', id);
        
                if (error) throw error;
        
                alert("刪除成功！");
                refreshAllData(); // 重新整理列表
            } catch (e) {
                console.error(e);
                alert("刪除失敗：" + e.message);
            }
        }
        // ==================== 🛠️ 標籤視覺化與文字同步邏輯 ====================

        // 移除單一飲料標籤（點擊 Tag 上的 ✕）
        function removeDrinkTag(tagValue) {
            const checkbox = document.querySelector(`input[name="modalDrinkTags"][value="${tagValue}"]`);
            if (checkbox) {
                checkbox.checked = false;
                syncDrinkTags();
            }
        }

        // 移除單一活動標籤（點擊 Tag 上的 ✕）
        function removeEventTag(tagValue) {
            const checkbox = document.querySelector(`input[name="modalEventTags"][value="${tagValue}"]`);
            if (checkbox) {
                checkbox.checked = false;
                syncEventTags();
            }
        }

        // 🍹 飲料同步：更新橢圓形 Tag 視覺 preview 並與 textarea 內建文字作同步
        function syncDrinkTags() {
            const checkboxes = document.querySelectorAll('input[name="modalDrinkTags"]');
            const tagContainer = document.getElementById('drinkTagContainer');
            const textInput = document.getElementById('modalDrinkRemark');
            
            const selectedTags = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedTags.push(cb.value);
            });

            // 1. 渲染漂亮的橢圓形 Tag 視覺模組
            if (selectedTags.length === 0) {
                tagContainer.innerHTML = `<span class="text-xs text-gray-400 italic">尚未勾選任何標籤...</span>`;
            } else {
                tagContainer.innerHTML = selectedTags.map(tag => `
                    <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-1 rounded-full border border-blue-200">
                        ${tag}
                        <button type="button" onclick="removeDrinkTag('${tag}')" class="hover:text-blue-500 focus:outline-none ml-0.5 text-[10px] font-bold">✕</button>
                    </span>
                `).join('');
            }

            // 2. 解析與同步資料文字
            let currentText = textInput.value.trim();
            let customPart = "";

            if (currentText.includes('|')) {
                customPart = currentText.split('|')[1].trim();
            } else {
                let tempText = currentText;
                checkboxes.forEach(cb => {
                    // 清理暫存，只保留除了標籤以外的手動自訂文字
                    tempText = tempText.replace(cb.value, "").replace(/[,，、|\s]/g, "");
                });
                if (tempText.length > 0) {
                    customPart = currentText;
                }
            }

            let tagsText = selectedTags.join(',');
            let finalText = tagsText;
            if (customPart) {
                finalText = tagsText ? `${tagsText} | ${customPart}` : customPart;
            }
            textInput.value = finalText;
        }

        // 🎉 活動同步：更新橢圓形 Tag 視覺 preview 並與 textarea 內建文字作同步
        function syncEventTags() {
            const checkboxes = document.querySelectorAll('input[name="modalEventTags"]');
            const tagContainer = document.getElementById('eventTagContainer');
            const textInput = document.getElementById('modalEventDetail');

            const selectedTags = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedTags.push(cb.value);
            });

            // 1. 渲染漂亮的橢圓形 Tag 視覺模組
            if (selectedTags.length === 0) {
                tagContainer.innerHTML = `<span class="text-xs text-gray-400 italic">尚未勾選任何標籤...</span>`;
            } else {
                tagContainer.innerHTML = selectedTags.map(tag => `
                    <span class="inline-flex items-center gap-1 bg-amber-100 text-amber-800 text-xs font-medium px-2.5 py-1 rounded-full border border-amber-200">
                        ${tag}
                        <button type="button" onclick="removeEventTag('${tag}')" class="hover:text-amber-500 focus:outline-none ml-0.5 text-[10px] font-bold">✕</button>
                    </span>
                `).join('');
            }

            // 2. 解析與同步資料文字
            let currentText = textInput.value.trim();
            let customPart = "";

            if (currentText.includes('|')) {
                customPart = currentText.split('|')[1].trim();
            } else {
                let tempText = currentText;
                checkboxes.forEach(cb => {
                    tempText = tempText.replace(cb.value, "").replace(/[,，、|\s]/g, "");
                });
                if (tempText.length > 0) {
                    customPart = currentText;
                }
            }

            let tagsText = selectedTags.join(',');
            let finalText = tagsText;
            if (customPart) {
                finalText = tagsText ? `${tagsText} | ${customPart}` : customPart;
            }
            textInput.value = finalText;
        }

        // ==================== 彈窗手動編輯邏輯 ====================
        function openEditModal(type, id) {
            document.getElementById('editItemType').value = type;
            document.getElementById('editItemId').value = id;

            // 初始化與清空所有核取方塊
            const drinkCheckboxes = document.querySelectorAll('input[name="modalDrinkTags"]');
            drinkCheckboxes.forEach(cb => cb.checked = false);

            const eventCheckboxes = document.querySelectorAll('input[name="modalEventTags"]');
            eventCheckboxes.forEach(cb => cb.checked = false);

            document.getElementById('modalDrinkFields').classList.add('hidden');
            document.getElementById('modalEventFields').classList.add('hidden');

            if (type === 'drink') {
                const item = localDrinks.find(d => d.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🍹 手動編輯：飲料品項";
                document.getElementById('modalDrinkFields').classList.remove('hidden');

                document.getElementById('modalDrinkName').value = item.name;
                document.getElementById('modalDrinkPrice').value = item.price;
                document.getElementById('modalDrinkRemark').value = item.remark || "";

                // 解析備註文字，自動打勾並觸發渲染圓形 Tag
                if (item.remark) {
                    drinkCheckboxes.forEach(cb => {
                        if (item.remark.includes(cb.value)) {
                            cb.checked = true;
                        }
                    });
                }
                syncDrinkTags(); // 即時生成漂亮的 Tag
            } else {
                const item = localEvents.find(ev => ev.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🎉 手動編輯：活動情報";
                document.getElementById('modalEventFields').classList.remove('hidden');

                document.getElementById('modalEventBrand').value = item.brand;
                document.getElementById('modalEventUrl').value = item.url;
                document.getElementById('modalEventStartDate').value = item.start_date || "";
                document.getElementById('modalEventEndDate').value = item.end_date || "";
                document.getElementById('modalEventDetail').value = item.detail || "";

                // 解析活動細節，自動打勾並觸發渲染圓形 Tag
                if (item.detail) {
                    eventCheckboxes.forEach(cb => {
                        if (item.detail.includes(cb.value)) {
                            cb.checked = true;
                        }
                    });
                }
                syncEventTags(); // 即時生成漂亮的 Tag
            }

            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editForm').reset();
        }

        // 手動編輯儲存提交
        async function saveEdit() {
            const type = document.getElementById('editItemType').value;
            const id = parseInt(document.getElementById('editItemId').value);

            let updatePayload = {};
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';

            if (type === 'drink') {
                updatePayload = {
                    name: document.getElementById('modalDrinkName').value.trim(),
                    price: parseInt(document.getElementById('modalDrinkPrice').value) || 0,
                    remark: document.getElementById('modalDrinkRemark').value.trim()
                };
            } else {
                updatePayload = {
                    brand: document.getElementById('modalEventBrand').value.trim(),
                    url: document.getElementById('modalEventUrl').value.trim(),
                    start_date: document.getElementById('modalEventStartDate').value.trim(),
                    end_date: document.getElementById('modalEventEndDate').value.trim(),
                    detail: document.getElementById('modalEventDetail').value.trim()
                };
            }

            try {
                const { error } = await supabaseClient
                    .from(targetTable)
                    .update(updatePayload)
                    .eq('id', id);

                if (error) throw error;

                closeModal();
                alert("修改成功！已更新回前台資料。");
                refreshAllData();

            } catch (e) {
                console.error(e);
                alert("儲存失敗：" + e.message);
            }
        }

        // ==================== 右側使用者回報處理邏輯 ====================

        // 1. 忽略回報
        async function ignoreReport(reportId) {
            if (!confirm("確定要忽略這筆勘誤回報嗎？原資料將不做變更。")) return;
            try {
                const { error } = await supabaseClient
                    .from('issue_reports')
                    .update({ status: 'rejected' })
                    .eq('id', reportId);

                if (error) throw error;
                alert("已忽略此回報。");
                refreshAllData();
            } catch (e) {
                console.error(e);
                alert("操作失敗：" + e.message);
            }
        }

        // 2. ⚡ 確認覆蓋原始資料
        async function overwriteAndApprove(reportId) {
            const report = localReports.find(rep => rep.id === reportId);
            if (!report) return;

            const targetId = report.target_id;
            const isDrink = report.target_type === 'drink';

            if (!confirm(`確定要將此使用者回報的新數值，直接覆蓋 ID ${targetId} 的原資料嗎？`)) return;

            try {
                let overwritePayload = {};
                const targetTable = isDrink ? 'drink_submissions' : 'event_submissions';

                if (isDrink) {
                    const original = localDrinks.find(d => d.id === targetId) || {};
                    overwritePayload = {
                        name: report.drink_name ? report.drink_name.trim() : original.name,
                        price: report.drink_price !== null ? report.drink_price : original.price,
                        remark: report.drink_remark ? report.drink_remark.trim() : original.remark
                    };
                } else {
                    const original = localEvents.find(e => e.id === targetId) || {};
                    overwritePayload = {
                        brand: report.event_brand ? report.event_brand.trim() : original.brand,
                        url: report.event_url ? report.event_url.trim() : original.url,
                        start_date: report.event_start_date ? report.event_start_date.trim() : original.start_date,
                        end_date: report.event_end_date ? report.event_end_date.trim() : original.end_date,
                        detail: report.event_detail ? report.event_detail.trim() : original.detail
                    };
                }

                // 更新原資料庫
                const updateOriginalRes = await supabaseClient
                    .from(targetTable)
                    .update(overwritePayload)
                    .eq('id', targetId);

                if (updateOriginalRes.error) throw updateOriginalRes.error;

                // 更新 `issue_reports` 的狀態
                const updateReportRes = await supabaseClient
                    .from('issue_reports')
                    .update({ 
                        status: 'approved'
                    })
                    .eq('id', reportId);

                if (updateReportRes.error) throw updateReportRes.error;

                alert("⚡ 覆蓋更新成功！原資料與審核狀態已全數同步完畢。");
                refreshAllData();

            } catch (e) {
                console.error(e);
                alert("覆蓋失敗：" + e.message);
            }
        }

        // 頁面初次載入
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showMainWorkspace();
            }
        };
    </script>
