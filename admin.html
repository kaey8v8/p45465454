<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員審核後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase 官方 CDN 腳本 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold text-gray-700">⚙️ 抽抽樂情報審核後台</h1>
            <a href="index.html" class="text-xs text-blue-500 border border-blue-200 px-2 py-1 rounded hover:bg-blue-50">返回首頁</a>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <!-- 登入區塊 -->
        <section id="loginSection" class="bg-white p-6 rounded-xl shadow-sm space-y-4">
            <h2 class="font-semibold text-gray-700 text-center text-base">🔑 管理員認證</h2>
            <p class="text-xs text-gray-400 text-center">請輸入管理員帳號與密碼</p>
            <div class="space-y-2">
                <!-- 這裡假裝是普通帳號輸入框 -->
                <input type="text" id="adminUsername" placeholder="管理員帳號..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <input type="password" id="adminPassword" placeholder="管理員密碼..." 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition">
                登入並載入待審清單
            </button>
        </section>

        <!-- 審核工作區 (預設隱藏) -->
        <section id="workSection" class="bg-white p-4 rounded-xl shadow-sm space-y-4 hidden">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="font-semibold text-gray-700">📥 待審核提案清單</h2>
                <div class="flex space-x-2">
                    <button onclick="logout()" class="text-xs text-red-500 border border-red-200 px-2 py-0.5 rounded hover:bg-red-50">登出</button>
                    <span id="pendingCount" class="bg-gray-200 text-gray-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
            </div>
            
            <!-- 待審列表展示區 -->
            <div id="pendingList" class="space-y-3">
                <p class="text-sm text-gray-400 text-center py-4">請先登入...</p>
            </div>
        </section>
    </main>

    <script>
// 🛠️ 填入你的 Supabase 設定
        const YOUR_SUPABASE_URL = "https://akxaulhkzlckkaxdthxo.supabase.co"; 
        const YOUR_SUPABASE_ANON_KEY = "sb_publishable_LP-Jf6ygyLe4rKNVeqS83A_E5jmMzw0";

        const supabaseClient = supabase.createClient(YOUR_SUPABASE_URL, YOUR_SUPABASE_ANON_KEY);
        let currentPendingCount = 0;

        // 管理員登入邏輯
        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!username || !password) {
                alert("請完整輸入帳號與密碼！");
                return;
            }

            const fakeEmail = username.includes('@') ? username : `${username}@fakeadmin.com`;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password
                });

                if (error) throw error;

                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('workSection').classList.remove('hidden');
                loadPendingList();

            } catch (e) {
                alert(`登入失敗：${e.message || '密碼錯誤或帳號不存在'}`);
            }
        }

        // 登出邏輯
        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('workSection').classList.add('hidden');
            document.getElementById('adminPassword').value = "";
        }

        // 載入待審清單 (篩選出 status = 'pending' 的資料)
        async function loadPendingList() {
            const listContainer = document.getElementById('pendingList');
            listContainer.innerHTML = `<p class="text-sm text-gray-400 text-center py-4">正在從資料庫撈取待審資料...</p>`;

            try {
                // 修正：向正確的表撈取 status 等於 pending 的資料
                const [drinksRes, eventsRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').eq('status', 'pending').order('created_at', { ascending: true }),
                    supabaseClient.from('event_submissions').select('*').eq('status', 'pending').order('created_at', { ascending: true })
                ]);

                if (drinksRes.error) throw drinksRes.error;
                if (eventsRes.error) throw eventsRes.error;

                const pendingDrinks = drinksRes.data || [];
                const pendingEvents = eventsRes.data || [];

                currentPendingCount = pendingDrinks.length + pendingEvents.length;
                document.getElementById('pendingCount').innerText = currentPendingCount;

                if (currentPendingCount === 0) {
                    showEmptyMessage();
                    return;
                }

                listContainer.innerHTML = "";

                pendingDrinks.forEach(item => {
                    renderPendingCard('drink', item.id, item);
                });

                pendingEvents.forEach(item => {
                    renderPendingCard('event', item.id, item);
                });

            } catch (e) {
                console.error(e);
                listContainer.innerHTML = `<p class="text-xs text-red-500 text-center">載入失敗，請確認管理員 RLS 權限設定。</p>`;
            }
        }

        // 渲染單張卡片 UI
        function renderPendingCard(type, id, data) {
            const container = document.getElementById('pendingList');
            const card = document.createElement('div');
            
            const cardId = `card_${type}_${id}`;
            card.id = cardId;
            card.className = "p-4 bg-gray-50 rounded-xl border border-gray-200 space-y-3 shadow-xs";
            
            const isDrink = type === 'drink';
            const badge = isDrink 
                ? `<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded font-medium">飲料回報</span>`
                : `<span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded font-medium">活動回報</span>`;

            let contentHtml = "";
            if (isDrink) {
                contentHtml = `
                    <div class="text-sm"><strong class="text-gray-500">品項：</strong><span class="font-bold text-gray-800">${data.name}</span></div>
                    <div class="text-sm"><strong class="text-gray-500">價格：</strong><span class="text-green-600 font-bold">${data.price} 元</span></div>
                    <div class="text-sm"><strong class="text-gray-500">備註：</strong><span class="text-gray-600">${data.remark || '無'}</span></div>
                `;
            } else {
                contentHtml = `
                    <div class="text-sm"><strong class="text-gray-500">品牌：</strong><span class="font-bold text-gray-800">${data.brand}</span></div>
                    <div class="text-sm"><strong class="text-gray-500">網址：</strong><a href="${data.url}" target="_blank" class="text-blue-500 underline text-xs break-all">${data.url}</a></div>
                    <div class="text-sm"><strong class="text-gray-500">截止：</strong><span class="text-gray-600">${data.end_date || '未填'}</span></div>
                    <div class="text-sm"><strong class="text-gray-500">細節：</strong><span class="text-gray-600">${data.detail || '無'}</span></div>
                `;
            }

            card.innerHTML = `
                <div class="flex justify-between items-center border-b pb-1.5">${badge}</div>
                <div class="space-y-1 py-1">${contentHtml}</div>
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button onclick="reviewAction('${type}', ${id}, 'reject', '${cardId}')" class="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-medium py-2 rounded-lg transition border border-red-200">
                        ❌ 拒絕/不通過
                    </button>
                    <button onclick="reviewAction('${type}', ${id}, 'approve', '${cardId}')" class="bg-green-600 hover:bg-green-700 text-white text-xs font-medium py-2 rounded-lg transition shadow-xs">
                        ✅ 同意上架
                    </button>
                </div>
            `;
            container.appendChild(card);
        }

        // 審核核心動作 (修正：改為更新原表的 status 狀態)
        async function reviewAction(type, id, action, cardElementId) {
            const actionText = action === 'approve' ? '同意上架' : '拒絕';
            if (!confirm(`確定要${actionText}這筆資料嗎？`)) return;

            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';
            const nextStatus = action === 'approve' ? 'approved' : 'rejected';

            try {
                // 獲取目前登入的管理員 Email 作為簽名
                const { data: { user } } = await supabaseClient.auth.getUser();
                const adminEmail = user ? user.email : 'Admin';

                // 直接更新該筆資料的狀態
                const { error } = await supabaseClient
                    .from(targetTable)
                    .update({ 
                        status: nextStatus,
                        admin_name: adminEmail
                    })
                    .eq('id', id);

                if (error) throw error;

                // 移除 UI 上的卡片
                const targetCard = document.getElementById(cardElementId);
                if (targetCard) targetCard.remove();

                currentPendingCount--;
                document.getElementById('pendingCount').innerText = currentPendingCount;

                if (currentPendingCount <= 0) {
                    showEmptyMessage();
                }

                alert(`${actionText}操作成功！`);

            } catch (e) {
                console.error(e);
                alert(`操作失敗：${e.message || '請確認管理員 RLS 更新權限'}`);
            }
        }

        function showEmptyMessage() {
            const listContainer = document.getElementById('pendingList');
            listContainer.innerHTML = `<p class="text-sm text-green-600 text-center py-6 font-medium">🎉 目前沒有任何待審核提案，大家都休息吧！</p>`;
        }

        // 自動檢查登入狀態
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('workSection').classList.remove('hidden');
                loadPendingList();
            }
        };
    </script>
</body>
</html>
