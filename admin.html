<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員審核後台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 antialiased">

    <!-- 頂部導覽列 -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40 shadow-xs">
        <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
            ⚙️ <span class="tracking-wide">抽抽樂情報管理與審核後台</span>
        </h1>
        <button id="logoutBtn" onclick="logout()" class="hidden text-xs bg-gray-50 text-gray-600 hover:text-red-600 border border-gray-200 hover:border-red-200 px-3 py-1.5 rounded-lg transition font-medium">
            👤 登出
        </button>
    </header>

    <!-- 登入區塊 -->
    <section id="loginSection" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl border border-gray-200 shadow-xl">
        <h3 class="text-lg font-bold text-gray-800 mb-4 text-center">👮管理登入</h3>
        <div class="space-y-3">
            <input type="text" id="adminUsername" placeholder="Email" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-hidden focus:border-blue-500">
            <input type="password" id="adminPassword" placeholder="密碼" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-hidden focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition shadow-sm">驗證並登入</button>
        </div>
    </section>

    <!-- 主工作區 -->
    <main id="workSection" class="hidden max-w-[1600px] mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- ==================== 左側：前台品項看板 (佔 2 欄) ==================== -->
        <section class="lg:col-span-2 space-y-4">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-xs p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <!-- 頁籤切換 -->
                <div class="flex border-b border-gray-200 w-full sm:w-auto">
                    <button id="tabDrink" onclick="switchActiveTab('drink')" class="px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600">
                        🍹 飲料 (<span id="countActiveDrinks">0</span>)
                    </button>
                    <button id="tabEvent" onclick="switchActiveTab('event')" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        🎉 活動 (<span id="countActiveEvents">0</span>)
                    </button>
                </div>

                <!-- 展開/折疊篩選系統按鈕 (僅在飲料分頁有用) -->
                <button id="btnToggleFilter" onclick="toggleFilterPanel()" class="text-xs bg-gray-50 text-gray-700 hover:bg-gray-100 border border-gray-200 px-3 py-2 rounded-lg flex items-center gap-1.5 transition ml-auto sm:ml-0 font-medium">
                    ⚙️ <span id="filterBtnText">展開篩選與排序</span>
                </button>
            </div>

            <!-- 📊 可折疊的進階篩選與排序面板 -->
            <div id="filterPanel" class="hidden bg-white rounded-2xl border border-gray-200 shadow-xs p-4 space-y-4 transition-all duration-300">
                <!-- 分類系統 -->
                <div>
                    <span class="text-xs font-bold text-gray-500 block mb-2">🥛🧋🍹</span>
                    <div class="flex flex-wrap gap-2" id="filterCategoryContainer">
                        <!-- 由 JS 動打標籤 -->
                    </div>
                </div>
                <!-- 糖分系統 -->
                <div>
                    <span class="text-xs font-bold text-gray-500 block mb-2">🍬</span>
                    <div class="flex gap-2">
                        <button onclick="toggleSugarFilter('有糖')" id="btnSugarSugar" class="px-3 py-1 text-xs rounded-full border border-gray-200 bg-gray-50 text-gray-600 transition">有糖</button>
                        <button onclick="toggleSugarFilter('無糖')" id="btnSugarFree" class="px-3 py-1 text-xs rounded-full border border-gray-200 bg-gray-50 text-gray-600 transition">無糖</button>
                    </div>
                </div>
                <hr class="border-gray-100">
                <!-- 排序系統 -->
                <div class="flex flex-wrap items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-gray-500">Import 排序規則:</span>
                        <select id="sortSelect" onchange="handleSortChange()" class="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 bg-gray-50 text-gray-700 focus:outline-hidden">
                            <option value="time_desc">上架時間：由新到舊</option>
                            <option value="time_asc">上架時間：由舊到新</option>
                            <option value="price_asc">單瓶價格：由低到高</option>
                            <option value="price_desc">單瓶價格：由高到低</option>
                        </select>
                    </div>
                    <button onclick="resetFilters()" class="text-[11px] text-red-500 hover:underline">重設所有篩選條件</button>
                </div>
            </div>

            <!--  飲料清單容器 -->
            <div id="drinkListContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- 由 JS 渲染卡片 -->
            </div>

            <!--  活動清單容器 (支援 RWD 多排卡片) -->
            <div id="eventListContainer" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- 由 JS 渲染卡片 -->
            </div>
        </section>

        <!-- ==================== 右側：綜合審核佇列 (佔 1 欄) ==================== -->
        <section class="space-y-4">
            <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-xs flex justify-between items-center">
                <h3 class="font-bold text-gray-900 text-sm flex items-center gap-1.5">
                    📥 審核佇列 
                    <span class="bg-red-50 text-red-600 text-xs px-2 py-0.5 rounded-full font-bold border border-red-100" id="totalPendingCount">0</span>
                </h3>
                <button onclick="refreshAllData()" class="text-xs text-blue-600 hover:text-blue-700 font-medium">🔄 重新整理</button>
            </div>
            
            <!-- 審核串流容器 -->
            <div class="space-y-4" id="reportListContainer">
                <!-- 由 JS 自動混合渲染新投稿與勘誤回報 -->
            </div>
        </section>
    </main>

    <!-- ==================== 彈窗手動編輯視窗 ==================== -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl border border-gray-200 max-w-md w-full p-5 space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                <h3 id="modalTitle" class="font-bold text-gray-800 text-sm">手動編輯</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-sm">✕</button>
            </div>

            <form id="editForm" onsubmit="event.preventDefault(); saveEdit();" class="space-y-3">
                <input type="hidden" id="editItemType">
                <input type="hidden" id="editItemId">

                <!-- 飲料專用欄位 -->
                <div id="modalDrinkFields" class="hidden space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">商品名稱</label>
                        <input type="text" id="modalDrinkName" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">單瓶價格</label>
                        <input type="number" id="modalDrinkPrice" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">備註說明 (Remark)</label>
                        <textarea id="modalDrinkRemark" rows="2" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500"></textarea>
                    </div>
                    <!-- 🏷️ 飲料促銷標籤管理區 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">🎁 活動/促銷 </label>
                        <div class="grid grid-cols-2 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]" id="modalPromoTagCheckboxGroup">
                            <!-- 由 JS 動態插入活動標籤 -->
                        </div>
                    </div>
                    <!-- 品項分類標籤管理區 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">🧋 商品分類 </label>
                        <div class="grid grid-cols-3 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]" id="modalDrinkTagCheckboxGroup">
                            <!-- 由 JS 動態插入分類標籤 -->
                        </div>
                    </div>
                </div>

                <!-- 活動專用欄位 -->
                <div id="modalEventFields" class="hidden space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">品牌活動名稱</label>
                        <input type="text" id="modalEventBrand" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">情報連結 URL</label>
                        <input type="url" id="modalEventUrl" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">開始日期</label>
                            <input type="date" id="modalEventStartDate" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">結束日期</label>
                            <input type="date" id="modalEventEndDate" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">活動細節說明</label>
                        <textarea id="modalEventDetail" rows="3" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-hidden focus:border-blue-500"></textarea>
                    </div>
                    <!--  新增：活動專用標籤管理區 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">🏷️ 標籤 </label>
                        <div class="grid grid-cols-3 gap-1.5 bg-gray-50 p-2 rounded-lg border border-gray-200 text-[11px]" id="modalEventTagCheckboxGroup">
                            <!-- 由 JS 動態插入活動標籤 -->
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
                    <button type="button" onclick="closeModal()" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-xs hover:bg-gray-200 transition">取消</button>
                    <button type="submit" class="px-4 py-1.5 bg-blue-600 text-white font-semibold rounded-lg text-xs hover:bg-blue-700 transition shadow-sm">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ====================  核心 JavaScript 處理核心 ==================== -->
    <script>
        //  Supabase 設定
        const YOUR_SUPABASE_URL = "https://akxaulhkzlckkaxdthxo.supabase.co"; 
        const YOUR_SUPABASE_ANON_KEY = "sb_publishable_LP-Jf6ygyLe4rKNVeqS83A_E5jmMzw0";
        const supabaseClient = supabase.createClient(YOUR_SUPABASE_URL, YOUR_SUPABASE_ANON_KEY);
        
        // 全域核心變數
        let localDrinks = [];
        let localEvents = [];
        let allPendingItems = []; 
        let currentTab = "drink";

        //  核心定義的內建標籤系統
        const CATEGORY_TAGS = ["茶", "水", "咖啡", "能量飲", "乳/豆", "果汁", "其他"];
        const SUGAR_TAGS = ["有糖", "無糖"];
        const PROMO_TAGS = ["第二件半價", "第二件折10元", "買一送一", "不確定有抽抽樂", "已無在架上看到"];
        
        //  新增：專屬活動的行為標籤清單
        const EVENT_BEHAVIOR_TAGS = ["登錄發票", "立即抽", "瓶蓋序號", "罐底序號", "需回函", "需簡訊"];

        //  目前活躍的篩選器狀態
        let selectedCategories = [];
        let selectedSugar = null; 
        let currentSortRule = "time_desc";

        // 登入驗證
        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            if (!username || !password) { alert("請完整輸入帳號與密碼！"); return; }
            const fakeEmail = username.includes('@') ? username : `${username}@fakeadmin.com`;
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email: fakeEmail, password: password });
                if (error) throw error;
                showMainWorkspace();
            } catch (e) { alert(`登入失敗：${e.message || '帳密錯誤'}`); }
        }

        function showMainWorkspace() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('workSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            initFilterUI();
            refreshAllData();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('workSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }

        // 初始化篩選按鈕面板與 Modal 複選框
        function initFilterUI() {
            const container = document.getElementById('filterCategoryContainer');
            if (container) {
                container.innerHTML = CATEGORY_TAGS.map(tag => `
                    <button onclick="toggleCategoryFilter('${tag}')" id="btnTag-${tag}" class="px-2.5 py-1 text-xs rounded-full border border-gray-200 bg-gray-50 text-gray-600 transition hover:bg-gray-100">
                        ${tag}
                    </button>
                `).join('');
            }
            
            // 渲染 Modal 內的「品項分類標籤」勾選組
            const modalCheckboxGroup = document.getElementById('modalDrinkTagCheckboxGroup');
            if(modalCheckboxGroup) {
                const allAvailableTags = [...CATEGORY_TAGS, ...SUGAR_TAGS];
                modalCheckboxGroup.innerHTML = allAvailableTags.map(tag => `
                    <label class="flex items-center gap-1.5 p-1 hover:bg-gray-100 rounded cursor-pointer">
                        <input type="checkbox" name="modalDrinkTags" value="${tag}" class="rounded text-blue-600 focus:ring-blue-400">
                        <span>${tag}</span>
                    </label>
                `).join('');
            }

            // 渲染 Modal 內的「飲料促銷標籤」勾選組
            const modalPromoGroup = document.getElementById('modalPromoTagCheckboxGroup');
            if(modalPromoGroup) {
                modalPromoGroup.innerHTML = PROMO_TAGS.map(tag => `
                    <label class="flex items-center gap-1.5 p-1 hover:bg-gray-100 rounded cursor-pointer">
                        <input type="checkbox" name="modalPromoTags" value="${tag}" class="rounded text-amber-600 focus:ring-amber-400">
                        <span>${tag}</span>
                    </label>
                `).join('');

                //  註冊監聽器：當飲料促銷標籤被勾選時，即時同步至 Remark 欄位
                document.querySelectorAll('input[name="modalPromoTags"]').forEach(cb => {
                    cb.addEventListener('change', syncPromoTagsToRemark);
                });
            }

            //  渲染 Modal 內的「活動專用標籤」勾選組
            const modalEventGroup = document.getElementById('modalEventTagCheckboxGroup');
            if(modalEventGroup) {
                modalEventGroup.innerHTML = EVENT_BEHAVIOR_TAGS.map(tag => `
                    <label class="flex items-center gap-1.5 p-1 hover:bg-gray-100 rounded cursor-pointer">
                        <input type="checkbox" name="modalEventTags" value="${tag}" class="rounded text-rose-600 focus:ring-rose-400">
                        <span>${tag}</span>
                    </label>
                `).join('');

                //  註冊監聽器：當活動標籤被勾選時，即時同步至 Detail 欄位
                document.querySelectorAll('input[name="modalEventTags"]').forEach(cb => {
                    cb.addEventListener('change', syncEventTagsToDetail);
                });
            }
        }

        //  同步飲料促銷標籤至 Remark 說明欄位
        function syncPromoTagsToRemark() {
            const checkedPromoTags = [];
            document.querySelectorAll('input[name="modalPromoTags"]').forEach(cb => {
                if (cb.checked) checkedPromoTags.push(cb.value);
            });

            const remarkTextarea = document.getElementById('modalDrinkRemark');
            let currentText = remarkTextarea.value.trim();
            currentText = currentText.replace(/^\[.*?\]\s*/, '');

            if (checkedPromoTags.length > 0) {
                remarkTextarea.value = `[${checkedPromoTags.join(', ')}] ${currentText}`;
            } else {
                remarkTextarea.value = currentText;
            }
        }

        //  同步活動行為標籤至 Detail 細節欄位
        function syncEventTagsToDetail() {
            const checkedEventTags = [];
            document.querySelectorAll('input[name="modalEventTags"]').forEach(cb => {
                if (cb.checked) checkedEventTags.push(cb.value);
            });

            const detailTextarea = document.getElementById('modalEventDetail');
            let currentText = detailTextarea.value.trim();
            currentText = currentText.replace(/^\[.*?\]\s*/, '');

            if (checkedEventTags.length > 0) {
                detailTextarea.value = `[${checkedEventTags.join(', ')}] ${currentText}`;
            } else {
                detailTextarea.value = currentText;
            }
        }

        // 展開/收合篩選器
        function toggleFilterPanel() {
            const panel = document.getElementById('filterPanel');
            const btnText = document.getElementById('filterBtnText');
            if(panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btnText.innerText = "收起篩選與排序";
            } else {
                panel.classList.add('hidden');
                btnText.innerText = "展開篩選與排序";
            }
        }

        // 核心資料載入
        async function refreshAllData() {
            try {
                const [drinksRes, eventsRes, reportsRes] = await Promise.all([
                    supabaseClient.from('drink_submissions').select('*').order('id', { ascending: false }),
                    supabaseClient.from('event_submissions').select('*').order('id', { ascending: false }),
                    supabaseClient.from('issue_reports').select('*').eq('status', 'pending').order('created_at', { ascending: true })
                ]);

                if (drinksRes.error) throw drinksRes.error;
                if (eventsRes.error) throw eventsRes.error;
                if (reportsRes.error) throw reportsRes.error;

                localDrinks = drinksRes.data || [];
                localEvents = eventsRes.data || [];
                const localReports = reportsRes.data || [];

                // 過濾出前台上架狀態
                const approvedDrinks = localDrinks.filter(d => d.status === 'approved');
                localEvents = localEvents.filter(ev => ev.status === 'approved');

                // 處理右側混合審核資料
                const pendingDrinks = localDrinks.filter(d => d.status === 'pending').map(item => ({ ...item, reviewType: 'newDrink' }));
                const pendingEvents = localEvents.filter(ev => ev.status === 'pending').map(item => ({ ...item, reviewType: 'newEvent' }));
                const parsedReports = localReports.map(item => ({ ...item, reviewType: 'report' }));

                allPendingItems = [...parsedReports, ...pendingDrinks, ...pendingEvents].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

                document.getElementById('countActiveEvents').innerText = localEvents.length;
                document.getElementById('totalPendingCount').innerText = allPendingItems.length;

                // 渲染左側卡片
                applyDrinkFiltersAndRender(approvedDrinks);
                renderActiveLists('event'); 
                renderUnifiedReviewList();

            } catch (e) { console.error(e); alert("資料庫連線讀取失敗，請確認資料庫狀態！"); }
        }

        //  飲料篩選與排序核心邏輯機制
        function applyDrinkFiltersAndRender(sourceDrinks = null) {
            let drinks = sourceDrinks ? sourceDrinks : localDrinks.filter(d => d.status === 'approved');

            // 分類標籤多選篩選
            if (selectedCategories.length > 0) {
                drinks = drinks.filter(d => {
                    if (!d.category_tags) return false;
                    const tagsArr = d.category_tags.split(',').map(t => t.trim());
                    return selectedCategories.every(cat => tagsArr.includes(cat));
                });
            }

            // 糖分篩選
            if (selectedSugar) {
                drinks = drinks.filter(d => {
                    if (!d.category_tags) return false;
                    const tagsArr = d.category_tags.split(',').map(t => t.trim());
                    return tagsArr.includes(selectedSugar);
                });
            }

            // 排序規則
            if (currentSortRule === "time_desc") {
                drinks.sort((a, b) => b.id - a.id);
            } else if (currentSortRule === "time_asc") {
                drinks.sort((a, b) => a.id - b.id);
            } else if (currentSortRule === "price_asc") {
                drinks.sort((a, b) => a.price - b.price);
            } else if (currentSortRule === "price_desc") {
                drinks.sort((a, b) => b.price - a.price);
            }

            document.getElementById('countActiveDrinks').innerText = drinks.length;
            renderDrinkListDOM(drinks);
        }

        // 分類點擊變更
        function toggleCategoryFilter(tag) {
            const btn = document.getElementById(`btnTag-${tag}`);
            if(selectedCategories.includes(tag)) {
                selectedCategories = selectedCategories.filter(c => c !== tag);
                btn.className = "px-2.5 py-1 text-xs rounded-full border border-gray-200 bg-gray-50 text-gray-600 transition hover:bg-gray-100";
            } else {
                selectedCategories.push(tag);
                btn.className = "px-2.5 py-1 text-xs rounded-full border border-blue-200 bg-blue-50 text-blue-600 font-semibold shadow-xs transition";
            }
            applyDrinkFiltersAndRender();
        }

        // 糖分點擊變更
        function toggleSugarFilter(type) {
            const btnSugar = document.getElementById('btnSugarSugar');
            const btnFree = document.getElementById('btnSugarFree');

            if (selectedSugar === type) {
                selectedSugar = null;
                btnSugar.className = btnFree.className = "px-3 py-1 text-xs rounded-full border border-gray-200 bg-gray-50 text-gray-600 transition";
            } else {
                selectedSugar = type;
                if(type === '有糖') {

        // ==================== 彈窗編輯處理 ====================
        function openEditModal(type, id) {
            document.getElementById('editItemType').value = type;
            document.getElementById('editItemId').value = id;

            // 清空、還原所有複選框勾選狀態
            document.querySelectorAll('input[name="modalPromoTags"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[name="modalDrinkTags"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('input[name="modalEventTags"]').forEach(cb => cb.checked = false);

            document.getElementById('modalDrinkFields').classList.add('hidden');
            document.getElementById('modalEventFields').classList.add('hidden');

            if (type === 'drink') {
                const item = localDrinks.find(d => d.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🍹 手動編輯";
                document.getElementById('modalDrinkFields').classList.remove('hidden');

                document.getElementById('modalDrinkName').value = item.name;
                document.getElementById('modalDrinkPrice').value = item.price;

                // 解析飲料促銷標籤與說明
                let displayRemark = item.remark || "";
                if (item.remark && item.remark.includes('[') && item.remark.includes(']')) {
                    const match = item.remark.match(/\[(.*?)\]/);
                    if (match) {
                        const existingPromoTags = match[1].split(',').map(t => t.trim());
                        document.querySelectorAll('input[name="modalPromoTags"]').forEach(cb => {
                            if (existingPromoTags.includes(cb.value)) cb.checked = true;
                        });
                        displayRemark = item.remark.replace(/\[.*?\]\s*/, '').trim();
                    }
                }
                document.getElementById('modalDrinkRemark').value = displayRemark;

                // 商品分類標籤
                if (item.category_tags) {
                    const existingTags = item.category_tags.split(',').map(t => t.trim());
                    document.querySelectorAll('input[name="modalDrinkTags"]').forEach(cb => {
                        if (existingTags.includes(cb.value)) cb.checked = true;
                    });
                }
            } else {
                const item = localEvents.find(ev => ev.id === id);
                if (!item) return;
                document.getElementById('modalTitle').innerText = "🎉 手動編輯";
                document.getElementById('modalEventFields').classList.remove('hidden');
                
                document.getElementById('modalEventBrand').value = item.brand;
                document.getElementById('modalEventUrl').value = item.url;
                document.getElementById('modalEventStartDate').value = item.start_date || "";
                document.getElementById('modalEventEndDate').value = item.end_date || "";
                
                // 解析活動現存的標籤與說明細節
                let displayDetail = item.detail || "";
                if (item.detail && item.detail.includes('[') && item.detail.includes(']')) {
                    const match = item.detail.match(/\[(.*?)\]/);
                    if (match) {
                        const existingEventTags = match[1].split(',').map(t => t.trim());
                        document.querySelectorAll('input[name="modalEventTags"]').forEach(cb => {
                            if (existingEventTags.includes(cb.value)) cb.checked = true;
                        });
                        displayDetail = item.detail.replace(/\[.*?\]\s*/, '').trim();
                    }
                }
                document.getElementById('modalEventDetail').value = displayDetail;
            }
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        // 儲存變更 (同步更新細節)
        async function saveEdit() {
            const type = document.getElementById('editItemType').value;
            const id = parseInt(document.getElementById('editItemId').value);
            let updatePayload = {};
            const targetTable = type === 'drink' ? 'drink_submissions' : 'event_submissions';

            if (type === 'drink') {
                const checkedCategoryTags = [];
                document.querySelectorAll('input[name="modalDrinkTags"]').forEach(cb => { if(cb.checked) checkedCategoryTags.push(cb.value); });

                const checkedPromoTags = [];
                document.querySelectorAll('input[name="modalPromoTags"]').forEach(cb => { if(cb.checked) checkedPromoTags.push(cb.value); });

                const userRemark = document.getElementById('modalDrinkRemark').value.trim();
                let finalRemark = userRemark;
                if (checkedPromoTags.length > 0 && !userRemark.startsWith('[')) {
                    finalRemark = `[${checkedPromoTags.join(', ')}] ${userRemark}`;
                }

                updatePayload = {
                    name: document.getElementById('modalDrinkName').value.trim(),
                    price: parseInt(document.getElementById('modalDrinkPrice').value) || 0,
                    category_tags: checkedCategoryTags.join(','),
                    remark: finalRemark
                };
            } else {
                const checkedEventTags = [];
                document.querySelectorAll('input[name="modalEventTags"]').forEach(cb => { if(cb.checked) checkedEventTags.push(cb.value); });

                const userDetail = document.getElementById('modalEventDetail').value.trim();
                let finalDetail = userDetail;
                
                // 防呆：儲存時如果偵測有勾選活動標籤，且使用者輸入框內還沒有 `[` 開頭的格式，強制組裝
                if (checkedEventTags.length > 0 && !userDetail.startsWith('[')) {
                    finalDetail = `[${checkedEventTags.join(', ')}] ${userDetail}`;
                }

                updatePayload = {
                    brand: document.getElementById('modalEventBrand').value.trim(),
                    url: document.getElementById('modalEventUrl').value.trim(),
                    start_date: document.getElementById('modalEventStartDate').value.trim(),
                    end_date: document.getElementById('modalEventEndDate').value.trim(),
                    detail: finalDetail
                };
            }

            try {
                const { error } = await supabaseClient.from(targetTable).update(updatePayload).eq('id', id);
                if (error) throw error;
                closeModal();
                alert("修改成功並已同步發布！");
                refreshAllData();
            } catch (e) { alert("儲存失敗：" + e.message); }
        }

        // 審核處理
        async function approveSubmission(type, id) {
            if (!confirm("確認核可發布到前台嗎？")) return;
            try {
                const { error } = await supabaseClient.from(type === 'drink' ? 'drink_submissions' : 'event_submissions').update({ status: 'approved' }).eq('id', id);
                if (error) throw error;
                refreshAllData();
            } catch (e) { alert("操作失敗：" + e.message); }
        }

        async function rejectSubmission(type, id) {
            if (!confirm("確定要拒絕並刪除投稿嗎？")) return;
            try {
                const { error } = await supabaseClient.from(type === 'drink' ? 'drink_submissions' : 'event_submissions').delete().eq('id', id);
                if (error) throw error;
                refreshAllData();
            } catch (e) { alert("操作失敗：" + e.message); }
        }

        async function ignoreReport(reportId) {
            if (!confirm("確定要忽略此勘誤回報嗎？")) return;
            try {
                const { error } = await supabaseClient.from('issue_reports').update({ status: 'rejected' }).eq('id', reportId);
                if (error) throw error;
                refreshAllData();
            } catch (e) { alert("操作失敗：" + e.message); }
        }

        async function overwriteAndApprove(reportId) {
            const report = allPendingItems.find(rep => rep.id === reportId && rep.reviewType === 'report');
            if (!report) return;
            const targetId = report.target_id;
            const isDrink = report.target_type === 'drink';

            if (!confirm(`確定要將回報新數據覆蓋原資料嗎？`)) return;

            try {
                let overwritePayload = {};
                if (isDrink) {
                    const original = localDrinks.find(d => d.id === targetId) || {};
                    overwritePayload = {
                        name: report.drink_name ? report.drink_name.trim() : original.name,
                        price: report.drink_price !== null ? report.drink_price : original.price,
                        category_tags: report.drink_category_tags ? report.drink_category_tags.trim() : original.category_tags,
                        remark: report.drink_remark ? report.drink_remark.trim() : original.remark
                    };
                } else {
                    const original = localEvents.find(e => e.id === targetId) || {};
                    overwritePayload = {
                        brand: report.event_brand ? report.event_brand.trim() : original.brand,
                        detail: report.event_detail ? report.event_detail.trim() : original.detail
                    };
                }

                await supabaseClient.from(isDrink ? 'drink_submissions' : 'event_submissions').update(overwritePayload).eq('id', targetId);
                await supabaseClient.from('issue_reports').update({ status: 'approved' }).eq('id', reportId);
                alert("✔️ 覆蓋更新成功！");
                refreshAllData();
            } catch (e) { alert("⚠️覆蓋失敗：" + e.message); }
        }

        async function deleteItem(type, id) {
            if (!confirm("確定要徹底刪除此項目嗎？")) return;
            try {
                await supabaseClient.from(type === 'drink' ? 'drink_submissions' : 'event_submissions').delete().eq('id', id);
                refreshAllData();
            } catch (e) { alert("刪除失敗"); }
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showMainWorkspace();
        };
    </script>
</body>
</html>
